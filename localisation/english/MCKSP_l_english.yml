l_english:
# MCKSP Mod - English localisation file

# Ideas localisation
 something_maybe_happened_idea:0 "Something is happening.."
 something_maybe_happened_idea_desc:0 "Rumors are circulating in the VKP(b) about a mysterious report from Yagoda to Stalin. No one knows the details, but one thing is clear — something is happening. People are starting to worry, and the government needs to get to the bottom of it."

 something_happened_idea:0 "Something has happened."
 something_happened_idea_desc:0 "More and more people are starting to talk about strange events happening in the capital. A top-secret report and data from a police report about the arrest of strange people - how quickly can someone put 2 and 2 together?"

 something_definetely_happened_idea:0 "Something is DEFINITELY happening"
 something_definetely_happened_idea_desc:0 "Rumors about what is happening are spreading through Moscow faster and faster. People are starting to panic, and the government needs to act quickly to prevent a possible crisis."

 guests_from_future_idea:0 "Guests from the future"
 guests_from_future_idea_desc:0 "There are rumors that a group of strangers from the future has arrived in the country. Despite the efforts of the NKVD, panic is starting to grow among the population. However, research institutes are jointly conducting research based on what they have learned from them to use future technologies for the benefit of the country."

# Events localisation
 start_event.1.t: "A Strange Report"
 start_event.1.d: "Heavy footsteps echo through the corridors of the Senate palace. Genrikh Yagoda, the People's Commissar for Internal Affairs, is hastily climbing the stairs, carrying a folder stamped with 'TOP SECRET' in red. His usually impassive face shows a hint of unease as he approaches Joseph Stalin's office. He knocks on the office door. A familiar voice grants him permission to enter.\n— Comrade Stalin, — Yagoda places the folder on the massive oak desk.\n— I must report a rather... unusual incident. I apologize for the late visit, but the situation requires your attention.\nJoseph Vissarionovich does not look up from his documents, merely pointing to the chair opposite him. Yagoda sits down, opening the folder with fingers trembling from tension.\n— Last night in Sokolniki our security forces discovered an object whose origin...\n— he pauses, — cannot be determined.\nThe leader finally looks up from the papers, his piercing eyes fixed on Yagoda.\n— And you believe this requires my attention, Comrade Yagoda? Why did you decide that this matter... the disappearance... needs to be classified at such a high level of secrecy? — he nodded towards the folder.\nHis interlocutor seems to shrink under the steel gaze.\n— The thing is its inexplicable nature. The professors of the Electrotechnical Institute, to whom we handed the object for examination, have been unable to tell us anything definite for several days. They opened the device and tried to determine its nature. The only thing they could establish is that it uses radio waves to transmit data. But that's barely one-tenth of what we need to know! They just shrug their shoulders!\nStalin calmly observed his subordinate's panicked speech.\n— I have heard your report, Comrade Yagoda. Undoubtedly, this is cause for some concern, and I await your further investigation. You are dismissed.\nThe Commissar stood up and hastily left the office, feeling the heavy gaze upon him. The folder with the report remained on the desk."
 start_event.1.a: "Something is happening.."

 start_event.2.t: "An Unexpected Witness"
 start_event.2.d: "Here will be written how a certain witness tells about seeing strangers from the future"
 start_event.2.a: "Something has happened."

 start_event.3.t: "Arrest of the Strangers"
 start_event.3.d: "Here will be described the next dialogue between Yagoda and Stalin, in which Yagoda tells about the strangers being arrested and interrogated"
 start_event.3.a: "Something is DEFINITELY happening."

 interrogation_event.1.t: "Interrogation of the Strangers"
 interrogation_event.1.d: "Continuation of the previous scene. Here will be described the interrogation of the strangers, during which their data is revealed, as well as the fact that they somehow ended up in 1936 not of their own free will. During the interrogation, they talk about the technologies of their time, which Yagoda relays to Stalin."
 interrogation_event.1.a: "These people are a threat. They must be eliminated."
 interrogation_event.1.b: "These people are an incredible opportunity for us. We must use their knowledge!"

# Meeting the participants
 introduction_event.1.t: "Daily life at closed Research Institute #14"
 introduction_event.1.d: "Here will be described how our group ended up at a closed research institute and was forced to work for the USSR, using their knowledge and skills. A smooth transition to the description of the dossiers."
 introduction_event.1.a: "Time to read their dossiers"
 introduction_event.1.b: "To hell with the documents, time for tea."

 introduction_event.2.t: "Dossier on cit. Iakushin"
 introduction_event.2.d: "§RTOP SECRET§!\nNKVD USSR\n\nDOSSIER №15431\n\nSURNAME, NAME, PATRONYMIC: Iakushin Nikita Sergeevich\nDATE OF BIRTH: 10.12.2004\nPLACE OF BIRTH: Moscow\nAGE: 21 years\n\n§RSPECIAL SKILLS AND KNOWLEDGE:§! Specialist in electronic computing devices of an unidentified type. Possesses extensive knowledge of calculating-logical machines, the nature and purpose of which are unknown to modern science. The full value of this information cannot be determined due to its anticipatory character.\n\n§RPERSONALITY DESCRIPTION:§!\nCHARACTER: Of melancholic disposition, withdrawn, inclined toward abstract reasoning. At the same time, among the detainees he exhibits the highest level of verbal activity — a contradiction warranting observation. References an unidentified personality typology system.\nPOLITICAL VIEWS: Adheres to views he defines as 'social-liberal': a combination of bourgeois-democratic principles with egalitarian ones. Professes secular humanism. Places personal career and material prosperity above all else, which indicates petty-bourgeois, acquisitive inclinations. Declares an unconditional rejection of war in any form, including the defense of the state. Defeatist sentiments under conditions of capitalist encirclement border on counter-revolutionary.\nBEHAVIOR DURING INTERROGATION: Calm, displays no signs of fear. Engages in arguments with the investigator, disputes the foundations of the Soviet system. No concealment or repentance observed.\nPOTENTIAL VALUE TO THE USSR: HIGH\nPOLITICAL RELIABILITY: EXTREMELY LOW\n§RCONCLUSION:§! High scientific value combined with pronounced ideological hostility. Use permissible only under conditions of isolation and constant supervision; independent activity is excluded. In daily life, traits incompatible with the image of a Soviet citizen have been noted. To be shielded from broad contact.\nPEOPLE'S COMMISSAR FOR INTERNAL AFFAIRS G.G. Yagoda"
 introduction_event.2.a: "Well, an unusual citizen..."

 introduction_event.3.t: "Dossier on cit. Popov"
 introduction_event.3.d: "§RTOP SECRET§!\nNKVD USSR\n\nDOSSIER №15432\n\nSURNAME, NAME, PATRONYMIC: Popov Ilya —\nDATE OF BIRTH: 07.12.2006\nPLACE OF BIRTH: Maikop\nAGE: 18 years\n\n§RSPECIAL SKILLS AND KNOWLEDGE:§! Specialist in the protection of secret information and the counteraction of its theft. Versed in cryptography and the safeguarding of data of state importance. His field of knowledge is of direct interest to the organs. Practical value high.\n\n§RPERSONALITY DESCRIPTION:§!\nCHARACTER: Sanguine. Active, participates in discussions more often than others. Rational, evaluates circumstances from the standpoint of state interest.\nPOLITICAL VIEWS: Supporter of the primacy of the state over the individual. Recognizes the necessity of a strong army and firm authority; views war with restraint. Ideologically compatible with statist principles.\nBEHAVIOR DURING INTERROGATION: Conducted himself in a composed manner, answered to the point. Demonstrated understanding of state interests and a willingness to cooperate.\nPOTENTIAL VALUE TO THE USSR: HIGH\nPOLITICAL RELIABILITY: MEDIUM\n§RCONCLUSION:§! Under proper direction, suitable for use in the interests of the state. Recommended for engagement with subsequent vetting.\nPEOPLE'S COMMISSAR FOR INTERNAL AFFAIRS G.G. Yagoda"
 introduction_event.3.a: "Science needs people like this!"

 introduction_event.4.t: "Dossier on cit. Okeanov"
 introduction_event.4.d: "§RTOP SECRET§!\nNKVD USSR\n\nDOSSIER №15433\n\nSURNAME, NAME, PATRONYMIC: Okeanov Evgeny —\nDATE OF BIRTH: 27.10.2003\nPLACE OF BIRTH: Moscow\nAGE: 22 years\n\n§RSPECIAL SKILLS AND KNOWLEDGE:§! Possesses military training and command experience, maintains ties with military circles. Trained in musical art. Organizational abilities noted.\n\n§RPERSONALITY DESCRIPTION:§!\nCHARACTER: Reserved, of few words, participates in discussions less often than others owing to being occupied. Capable of leading a group. Considers self-improvement his main pursuit.\nPOLITICAL VIEWS: Adheres to conservative views, consistent in his commitment to a strong state and order; places security above personal freedoms. Professes Orthodoxy and draws inspiration from the 'Russian people', which indicates religious and national-imperial sentiments incompatible with the party line. Capable of feigned tolerance toward foreign views when necessary.\nBEHAVIOR DURING INTERROGATION: Calm, disciplined, answered clearly, showed no signs of fear. Did not display hostility toward Soviet power.\nPOTENTIAL VALUE TO THE USSR: HIGH\nPOLITICAL RELIABILITY: MEDIUM\n§RCONCLUSION:§! His organizational and military qualities are of considerable value. However, his religiosity and great-power sentiments require close attention; the subject's loyalty must in due time be redirected toward the proper object.\nPEOPLE'S COMMISSAR FOR INTERNAL AFFAIRS G.G. Yagoda"
 introduction_event.4.a: "Honor and glory to a true warrior!"

 introduction_event.5.t: "Dossier on cit. S. Pavlov"
 introduction_event.5.d: "§RTOP SECRET§!\nNKVD USSR\n\nDOSSIER №15434\n\nSURNAME, NAME, PATRONYMIC: Pavlov Stepan —\nDATE OF BIRTH: 26.08.2006\nPLACE OF BIRTH: Saransk\nAGE: 19 years\n\n§RSPECIAL SKILLS AND KNOWLEDGE:§! By occupation — a teacher. Notable for broad erudition; his knowledge is of an abstract character and has almost no practical application. An interest in the products of Japanese animated cinematography has been noted — a circumstance subject to verification given the intentions of the Empire of Japan.\n\n§RPERSONALITY DESCRIPTION:§!\nCHARACTER: Balanced, accommodating, avoids conflicts.\nPOLITICAL VIEWS: Takes no definite stance, rejects politics, adheres to a middle line in all matters. Consistently opposes war. The absence of class position is itself a matter requiring attention.\nBEHAVIOR DURING INTERROGATION: Conducted himself meekly, did not contradict the investigator, provided no valuable information for lack of any.\nPOTENTIAL VALUE TO THE USSR: LOW\nPOLITICAL RELIABILITY: MEDIUM\n§RCONCLUSION:§! Practical value insignificant, no clear danger established. Shares a surname with the detainee A. Pavlov; familial connection not established. Use permissible in the educational field under supervision.\nPEOPLE'S COMMISSAR FOR INTERNAL AFFAIRS G.G. Yagoda"
 introduction_event.5.a: "I don't know why, but I like him."

 introduction_event.6.t: "Dossier on cit. Danchenko"
 introduction_event.6.d: "§RTOP SECRET§!\nNKVD USSR\n\nDOSSIER №15435\n\nSURNAME, NAME, PATRONYMIC: Danchenko Ivan —\nDATE OF BIRTH: 08.11.2009\nPLACE OF BIRTH: Minsk, BSSR\nAGE: 16 years\n\n§RSPECIAL SKILLS AND KNOWLEDGE:§! Training as an air fleet engineer, specializing in aviation. Knowledge of the construction of advanced aircraft is of paramount value to the defense industry.\n\n§RPERSONALITY DESCRIPTION:§!\nCHARACTER: Sanguine, active. Close in disposition to the detainee Popov, presumably on friendly terms with him. Considers science and research his main pursuit.\nPOLITICAL VIEWS: A statist, supporter of a strong power; at the same time, holds no pronounced political position, adheres to moderate views and is absorbed in scientific and technical interests. Inspired by the idea of conquering airspace and outer space. Views war with caution. Native of the Byelorussian SSR.\nBEHAVIOR DURING INTERROGATION: Answered confidently, provided detailed information on the air fleet. Presents no threat.\nPOTENTIAL VALUE TO THE USSR: HIGH\nPOLITICAL RELIABILITY: HIGH\n§RCONCLUSION:§! His knowledge in the field of aircraft construction makes the subject especially valuable to the Air Force. Recommended for engagement in design work at the earliest opportunity.\nPEOPLE'S COMMISSAR FOR INTERNAL AFFAIRS G.G. Yagoda"
 introduction_event.6.a: "Together we shall raise our planes into the sky!"

 introduction_event.7.t: "Dossier on cit. Rychkov"
 introduction_event.7.d: "§RTOP SECRET§!\nNKVD USSR\n\nDOSSIER №15436\n\nSURNAME, NAME, PATRONYMIC: Rychkov Gleb —\nDATE OF BIRTH: 01.01.2007\nPLACE OF BIRTH: Saratov\nAGE: 19 years\n\n§RSPECIAL SKILLS AND KNOWLEDGE:§! Trains in the specialty of computing machines, versed in the protection of secret information. Of value both to the scientific and to the operational fields.\n\n§RPERSONALITY DESCRIPTION:§!\nCHARACTER: Phlegmatic. Imperturbable, takes no part in disputes, maintains even behavior under any circumstances. Abilities for mediation and the settling of disagreements have been noted.\nPOLITICAL VIEWS: By his own admission, previously adhered to liberal views, subsequently exchanging them for statist and military ones. The abrupt change of convictions is subject to verification as to sincerity.\nBEHAVIOR DURING INTERROGATION: Held himself evenly, answered thoughtfully, showed no agitation. His excessive self-possession is noted as a circumstance requiring attention.\nPOTENTIAL VALUE TO THE USSR: HIGH\nPOLITICAL RELIABILITY: MEDIUM\n§RCONCLUSION:§! Valuable for his knowledge and capacity for mediation. The sincerity of his change of convictions is subject to verification in practice.\nPEOPLE'S COMMISSAR FOR INTERNAL AFFAIRS G.G. Yagoda"
 introduction_event.7.a: "A true patriot"

 introduction_event.8.t: "Dossier on cit. Ikonomidi"
 introduction_event.8.d: "§RTOP SECRET§!\nNKVD USSR\n\nDOSSIER №15437\n\nSURNAME, NAME, PATRONYMIC: Ikonomidi Demokrit Vasilievich\nDATE OF BIRTH: 14.12.2007\nPLACE OF BIRTH: Sverdlovsk (of Greek origin)\nAGE: 18 years\n\n§RSPECIAL SKILLS AND KNOWLEDGE:§! A pronounced inclination toward trade and entrepreneurial activity has been noted — an inclination inadmissible for a Soviet citizen, characteristic of the NEP-man element. By his own words, one of the founders of the group.\n\n§RPERSONALITY DESCRIPTION:§!\nCHARACTER: Active, practical, talkative. Names 'the perfection of the world' as his principal goal.\nPOLITICAL VIEWS: Claims adherence to socialist views, which does not align with his entrepreneurial inclinations, his professed Orthodoxy, or his pronounced patriotic feelings toward Greece. Inspired by ideas of space exploration and by mountainous landscapes. Loyalty to a foreign state in an element of alien origin, combined with religiosity, presents alarming circumstances.\nBEHAVIOR DURING INTERROGATION: Answered in detail, repeatedly mentioned Greece, persistently affirmed his socialist convictions — which diminishes their credibility.\nPOTENTIAL VALUE TO THE USSR: MEDIUM\nPOLITICAL RELIABILITY: LOW\n§RCONCLUSION:§! The combination of socialist rhetoric with private-entrepreneurial inclinations, religiosity, and alien-origin patriotism characterizes the subject as contradictory and unreliable. The authenticity of his name and surname is subject to verification.\nPEOPLE'S COMMISSAR FOR INTERNAL AFFAIRS G.G. Yagoda"
 introduction_event.8.a: "I wonder if that's really his name? I should check with the stenographer."

 introduction_event.9.t: "Dossier on cit. A. Pavlov"
 introduction_event.9.d: "§RTOP SECRET§!\nNKVD USSR\n\nDOSSIER №15438\n\nSURNAME, NAME, PATRONYMIC: Pavlov Arseny —\nDATE OF BIRTH: 21.02.2007\nPLACE OF BIRTH: Kalinin\nAGE: 18 years\n\n§RSPECIAL SKILLS AND KNOWLEDGE:§! Information on his occupation is incomplete. Of a humanities-oriented disposition, without pronounced practical skills; places beauty and art above all else.\n\n§RPERSONALITY DESCRIPTION:§!\nCHARACTER: Reserved, accommodating, benevolent. Similar in manner to the detainee S. Pavlov (sharing the same surname; familial connection not established).\nPOLITICAL VIEWS: Publicly takes a position of indifference toward politics. At the same time, according to gathered information, adheres to bourgeois-liberal and secular-humanist views similar to those of citizen Iakushin. It is premature to reliably establish the degree of their alignment.\nBEHAVIOR DURING INTERROGATION: Conducted himself meekly, agreed with everything, was not caught in anything reprehensible. Gives the impression of being harmless; the degree of harmlessness raises doubts.\nPOTENTIAL VALUE TO THE USSR: LOW\nPOLITICAL RELIABILITY: MEDIUM\n§RCONCLUSION:§! Outwardly reliable; however, the discrepancy between his public detachment and the gathered information about his views requires attention: is the subject perhaps concealing convictions similar to those of citizen Iakushin? Surveillance to continue.\nPEOPLE'S COMMISSAR FOR INTERNAL AFFAIRS G.G. Yagoda"
 introduction_event.9.a: "He reminds me of someone..."

 campaign_event.1.t: "The Army has accomplished the task"
 campaign_event.1.d: "The deployed troops have successfully completed the assigned task. All individuals involved in the 'B Incident' have been located and isolated. However, there were arrests of uninvolved persons and riots, which caused some discontent among the population. Nevertheless, the information about the incident was effectively concealed (along with the carriers), and further dissemination of information was prevented."
 campaign_event.1.a: "The army has accomplished its task, whether you like it or not."

 campaign_event.2.t: "The NKVD takes control of the situation"
 campaign_event.2.d: "The additional resources allocated to address the consequences of the incident have finally paid off. The NKVD has successfully taken control of the situation. All individuals involved in the 'B Incident' have been located and arrested. Thanks to the decisive actions of the NKVD, further dissemination of information was effectively prevented, and the situation stabilized."
 campaign_event.2.a: "The NKVD is the punishing sword of the dictatorship of the working class."

 campaign_event.3.t: "Propaganda worked"
 campaign_event.3.d: "Our propaganda efforts have been successful. State media effectively discredited witnesses and presented an alternative version of events, which helped calm the public and prevent the spread of rumors. Although some people still have doubts, most have accepted the official version of events."
 campaign_event.3.a: "The newspaper is not only a collective propagandist and agitor, but also a collective organizer"

 campaign_event.4.t: "Unrest is decreasing"
 campaign_event.4.d: "It seems that the non-intervention strategy was not a mistake. Over time, public attention to the incident begins to wane, and the cover-up campaign can be called successful. Although some people still discuss what happened, most no longer show interest in it."
 campaign_event.4.a: "Sometimes the best thing to do is not to interfere"

 campaign_event.5.t: "The incident has completely dropped off the agenda"
 campaign_event.5.d: "This was the best decision possible. People who are used to not trusting propaganda quickly lost interest in the incident due to the lack of attention from the state. As a result, the 'B Incident' completely disappeared from public consciousness, and further dissemination of information was successfully prevented."
 campaign_event.5.a: "Speech is silver, silence is golden"

 campaign_event.6.t: "Unrest is growing"
 campaign_event.6.d: "The party's passivity and indecision have turned into a disaster. Rumors and discontent are spreading, and the situation is getting out of control. People are starting to openly express their dissatisfaction and demand the truth, and the government is facing growing difficulties in trying to maintain order. The 'B Incident' is becoming a central topic of public discussion, and further dissemination of information is becoming inevitable."
 campaign_event.6.a: "Someone should be executed for this"

