l_english:
# MCKSP Mod - English ideologies localisation file
# Static names + descriptions. Pre-activation hiding for parties_grid + pie chart
# is done via initial set_party_name = MCKSP_redacted in on_actions/on_startup.
# Ideology popup (click) uses these locales directly — minor leak pre-trigger.

 mcksp_social_liberalism: "Social-Liberalism"
 mcksp_social_liberalism_desc: "Doctrine of progressive democracy. Welfare state, civil liberties, regulated market, and an active role of the state in providing equal opportunity."
 mcksp_social_liberalism_t: "Social-Liberalism"
 mcksp_social_liberalism_t_desc: "Doctrine of progressive democracy. Welfare state, civil liberties, regulated market, and an active role of the state in providing equal opportunity."

 mcksp_liberal_humanism: "Liberal Humanism"
 mcksp_liberal_humanism_desc: "Humanistic liberalism emphasizing human rights, diversity, and tolerance. Minimal state interference in private affairs, protection of vulnerable groups."
 mcksp_liberal_humanism_t: "Liberal Humanism"
 mcksp_liberal_humanism_t_desc: "Humanistic liberalism emphasizing human rights, diversity, and tolerance. Minimal state interference in private affairs, protection of vulnerable groups."

 mcksp_christian_democracy: "Christian Democracy"
 mcksp_christian_democracy_desc: "Union of Christian values with social democracy. Family, tradition, solidarity, and social justice through collective responsibility."
 mcksp_christian_democracy_t: "Christian Democracy"
 mcksp_christian_democracy_t_desc: "Union of Christian values with social democracy. Family, tradition, solidarity, and social justice through collective responsibility."

 mcksp_market_socialism: "Market Socialism"
 mcksp_market_socialism_desc: "Socialism with market mechanisms. Public ownership of key sectors, market allocation in consumer goods, workers' self-management."
 mcksp_market_socialism_t: "Market Socialism"
 mcksp_market_socialism_t_desc: "Socialism with market mechanisms. Public ownership of key sectors, market allocation in consumer goods, workers' self-management."

 mcksp_pragmatic_syncretism: "Pragmatic Syncretism"
 mcksp_pragmatic_syncretism_desc: "Synthesis of various ideological traditions. Pragmatic approach to governance, rejection of dogmatism, picking the best from opposed systems."
 mcksp_pragmatic_syncretism_t: "Pragmatic Syncretism"
 mcksp_pragmatic_syncretism_t_desc: "Synthesis of various ideological traditions. Pragmatic approach to governance, rejection of dogmatism, picking the best from opposed systems."

 mcksp_scientific_progressism: "Technocratic Progressivism"
 mcksp_scientific_progressism_desc: "Ideology of scientific-technical progress. Data-driven governance, investment in science and education, rational planning."
 mcksp_scientific_progressism_t: "Technocratic Progressivism"
 mcksp_scientific_progressism_t_desc: "Ideology of scientific-technical progress. Data-driven governance, investment in science and education, rational planning."

 mcksp_statist_technocratism: "Statist Technocracy"
 mcksp_statist_technocratism_desc: "Strong state run by a technocratic elite. Meritocracy, planned economy, centralized decision-making on a scientific basis."
 mcksp_statist_technocratism_t: "Statist Technocracy"
 mcksp_statist_technocratism_t_desc: "Strong state run by a technocratic elite. Meritocracy, planned economy, centralized decision-making on a scientific basis."

 mcksp_national_conservatism: "National Conservatism"
 mcksp_national_conservatism_desc: "Defense of national identity, tradition, and sovereignty. Strong state, traditional values, economic patriotism."
 mcksp_national_conservatism_t: "National Conservatism"
 mcksp_national_conservatism_t_desc: "Defense of national identity, tradition, and sovereignty. Strong state, traditional values, economic patriotism."

 MCKSP_redacted: "§RFORBIDDEN§!"
 MCKSP_redacted_desc: "Information about this political group is unavailable in the NKVD registry. Access to materials suspended."

 mcksp_technocratic_order: "TO"
 mcksp_technocratic_order_desc: "Technocratic Order. A degenerated form of sovereigntist national conservatism: a totalitarian dictatorship of an engineering corps, with unconditional supremacy of the 'competent' over the masses."

 mcksp_democratic_socialism: "Democratic Socialism"
 mcksp_democratic_socialism_desc: "Socialism with a human face. Perestroika and glasnost, partial transition to market mechanisms while preserving public ownership of key industries. A reform course modelled on Gorbachev and Deng Xiaoping: modernisation without abandoning the socialist foundation."
 mcksp_democratic_socialism_t: "Democratic Socialism"
 mcksp_democratic_socialism_t_desc: "Socialism with a human face. Perestroika and glasnost, partial transition to market mechanisms while preserving public ownership of key industries. A reform course modelled on Gorbachev and Deng Xiaoping: modernisation without abandoning the socialist foundation."

# PLACEHOLDER ideology for Ilgam — rename via set_party_name once concept is defined.
 mcksp_placeholder_ilgam: "Fagamanov's Party"
 mcksp_placeholder_ilgam_desc: "PLACEHOLDER. Ideology of Ilgam Fagamanov's party — concept TBD."
 mcksp_placeholder_ilgam_t: "Fagamanov's Party"
 mcksp_placeholder_ilgam_t_desc: "PLACEHOLDER. Ideology of Ilgam Fagamanov's party — concept TBD."
