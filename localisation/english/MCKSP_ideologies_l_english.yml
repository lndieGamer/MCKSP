l_english:
# MCKSP Mod - English ideologies localisation file

# democratic group sub-ideologies
 mcksp_social_liberalism: "UDS"
 mcksp_social_liberalism_desc: "Union of Democratic Socialism. Pacifist social liberalism: a combination of bourgeois-democratic principles with egalitarian ones, secular humanism, unconditional rejection of war."

 mcksp_liberal_humanism: "LCL"
 mcksp_liberal_humanism_desc: "League of Civil Liberties. Liberal humanism with emphasis on culture, art, and individual dignity. Politics as a function of ethics."

 mcksp_christian_democracy: "CDU"
 mcksp_christian_democracy_desc: "Christian Democratic Union. A centrist stance grounded in traditional values and social solidarity. Anti-war conservatism."

# communism group sub-ideologies
 mcksp_market_socialism: "NEU"
 mcksp_market_socialism_desc: "New Economic Union. The Bukharinist path — NEP without rollback, cooperation and cost-accounting while preserving public ownership."

# neutrality group sub-ideologies
 mcksp_pragmatic_syncretism: "BoC"
 mcksp_pragmatic_syncretism_desc: "Bloc of Consensus. Pragmatic syncretism without ideological rigidity. Power as the art of compromise between extremes."

 mcksp_scientific_progressism: "USP"
 mcksp_scientific_progressism_desc: "Union of Scientific Progress. A course of accelerated technological development — aviation, electronics, space exploration."

 mcksp_statist_technocratism: "USO"
 mcksp_statist_technocratism_desc: "Union of State Order. The primacy of the state over the individual, governance through a corps of specialists. Security and order above personal freedoms."

 mcksp_national_conservatism: "RSU"
 mcksp_national_conservatism_desc: "Russian Sovereign Union. Strong sovereign power, tradition, hierarchy. Orthodoxy, army, people — the three pillars of national revival."

# fascism group sub-ideologies (dark finale)
 mcksp_technocratic_order: "TO"
 mcksp_technocratic_order_desc: "Technocratic Order. A degenerated form of statist technocratism: a totalitarian dictatorship of an engineering corps, with unconditional supremacy of the 'competent' over the masses."
