 # --- Decision category ---
 SOV_MCKSP_trust_cat: "The Leader's Trust"
 SOV_MCKSP_trust_cat_desc: "Joseph Vissarionovich watches the guests from the future closely. Every move brings us either toward his favour or toward the execution wall."

 # --- 2-a Gift from the Future ---
 SOV_gift_from_future_tt: "Grants a random next technology in one of the branches"
 SOV_gift_from_future: "Gift from the Future"
 SOV_gift_from_future_desc: "Hand Comrade Stalin one of the technologies brought from the future. The gesture of goodwill strengthens his trust, but distracts our scientists from current work."

 # --- 2-b Public Oath to the Leader ---
 SOV_public_oath: "Public Oath to the Leader"
 SOV_public_oath_desc: "Put the guests on the rostrum and make them publicly swear loyalty to Comrade Stalin. Trust spikes, but the people sour on our parties.\n\nOne-time. Available if at least one guest party is at 10%+."

 # --- 2-c Scapegoat ---
 SOV_scapegoat: "Scapegoat"
 SOV_scapegoat_desc: "On the guests' own tip, stage the arrest of one of them at the Party congress. If it succeeds, Stalin's trust soars. If it fails, the consequences are unpredictable.\n\nOpens the victim-selection buttons (below)."

 # --- 2-d Secret Party Agitation ---
 SOV_secret_agitation: "Secret Party Agitation"
 SOV_secret_agitation_desc: "Launch underground agitation for the guest parties. The people drift toward us, but Stalin smells trouble."

 # --- 2-e Report of Success ---
 SOV_success_report: "Report of Success"
 SOV_success_report_desc: "Report labour achievements to the Leader. Trust rises, but factories must be turned over to consumer goods."

 # --- 2-f Unauthorized Initiative ---
 SOV_unauthorized_initiative: "Unauthorized Initiative"
 SOV_unauthorized_initiative_desc: "Act around the Leader, pushing the guests' ideas directly. The people respond, but Stalin will not approve."

 # --- Ideas / national spirit ---
 guests_from_future_weakened_idea: "Guests from the future"
 guests_from_future_weakened_idea_desc: "Our best minds are busy dissecting the technologies handed to the Leader — the research bonus is temporarily halved.\n\n§R-25%§! political power gain\n§R-20%§! stability\n§Y+50%§! research speed"

 mcksp_secret_agitation_idea: "Secret Party Agitation"
 mcksp_secret_agitation_idea_desc: "Underground agitators recruit supporters for the guest parties day after day.\n\n§Y+20 pp total§! popularity to the guest bloc over 140 days\n§R-5%§! political power gain"

 mcksp_enemy_abroad_spirit: "Enemy of the People Abroad!"
 mcksp_enemy_abroad_spirit_desc: "The fugitive smears Soviet rule from abroad. While Stalin holds the reins, this disgrace cannot be erased.\n\n§R-15%§! stability\n§R-10%§! political power gain"

