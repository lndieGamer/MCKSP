 scapegoat_event.2.t: "Preparing the Arrest"
 scapegoat_event.2.d: "The NKVD is ready to move. The papers are signed, the route mapped. All that remains is to give the order — or back off while there is still time."
 scapegoat_event.2.order: "Give the order"
 scapegoat_event.2.order_tt: "§RThis will lead to unpredictable consequences...§!"
 scapegoat_event.2.cancel: "Call off the operation"

 scapegoat_event.4.t: "Sentence Carried Out"
 scapegoat_event.4.d: "The operation went off without a hitch. The chosen guest was arrested, tried, and shot as an enemy of the people. His party is outlawed. Comrade Stalin is pleased with our vigilance."
 scapegoat_event.4.a: "So perish all enemies of the revolution"

 scapegoat_event.5.t: "The Enemy Slipped Away"
 scapegoat_event.5.d: "Something went wrong. Warned by someone, our 'scapegoat' crossed the border and now smears Soviet rule from abroad. The Leader is furious."
 scapegoat_event.5.a: "Damn it!"
 scapegoat_event.5.b: "Catch me if you can..."
