# MCKSP Mod - Russian decisions localisation file

SOV_MCKSP_decisions_cat: "Кампания по сокрытию Инцидента 'Б'"
  SOV_MCKSP_decisions_cat_desc: "Произошедшие в Москве события были названы Инцидентом 'Б'. К сожалению, информация о людях из иного времени уже просочилась за пределы правительственных кабинетов. Мы должны принять меры, чтобы предотвратить дальнейшее распространение этой информации."

  SOV_debug_finish_coverup: "[DEBUG] Завершить сокрытие"
  SOV_debug_finish_coverup_desc: "§RОтладочное решение (только в режиме -debug).§! Мгновенно снимает все уровни идеи инцидента Б — сокрытие считается завершённым, после чего запускается допрос."

  decision_cost_CP_15: "£command_power  §Y15§!"
  decision_cost_CP_15_blocked: "£command_power  §R15§!"
  decision_cost_CP_15_tooltip: "Необходимо иметь £command_power  §Y15§! для применения решения"

  decision_cost_CP_20: "£command_power  §Y20§!"
  decision_cost_CP_20_blocked: "£command_power  §R20§!"
  decision_cost_CP_20_tooltip: "Необходимо иметь £command_power  §Y20§! для применения решения"

  decision_cost_CP_30: "£command_power  §Y30§!"
  decision_cost_CP_30_blocked: "£command_power  §R30§!"
  decision_cost_CP_30_tooltip: "Необходимо иметь £command_power  §Y30§! для применения решения"

  decision_cost_CP_40: "£command_power  §Y40§!"
  decision_cost_CP_40_blocked: "£command_power  §R40§!"
  decision_cost_CP_40_tooltip: "Необходимо иметь £command_power  §Y40§! для применения решения"

  SOV_involve_army: "Привлечь армию"
  SOV_involve_army_desc: "Мы можем поручить Красной Армии найти и изолировать всех, кто был вовлечён в Инцидент 'Б'. Это может быть рискованно, но это поможет предотвратить дальнейшее распространение информации."

  SOV_special_forces: "Привлечь НКВД"
  SOV_special_forces_desc: "Мы можем поручить НКВД взять ситуацию под контроль. Это потребует выделения дополнительных ресурсов, но это поможет наиболее быстро и эффективно предотвратить дальнейшее распространение информации и стабилизировать ситуацию."

  SOV_propaganda_speeches: "Пропагандистские речи"
  SOV_propaganda_speeches_desc: "Мы можем использовать государственные СМИ для распространения пропагандистских речей, которые будут дискредитировать свидетелей и выстроят альтернативную версию событий. Это может помочь успокоить общественность и предотвратить распространение слухов"

  SOV_let_things_slide: "Пустить всё на самотёк"
  SOV_let_things_slide_desc: "Мы можем решить не предпринимать никаких действий и позволить событиям развиваться самостоятельно. Это рискованный шаг, но он может помочь избежать ненужного внимания к инциденту 'Б'. Иногда лучше всего просто не вмешиваться"

