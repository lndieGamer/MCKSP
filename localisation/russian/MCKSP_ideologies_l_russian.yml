l_russian:
# MCKSP Mod - Russian ideologies localisation file

# democratic group sub-ideologies
 mcksp_social_liberalism: "СДС"
 mcksp_social_liberalism_desc: "Союз демократического социализма. Социал-либерализм пацифистского толка: сочетание буржуазно-демократических установок с уравнительными, светский гуманизм, безусловный отказ от войны."

 mcksp_liberal_humanism: "ЛГС"
 mcksp_liberal_humanism_desc: "Лига гражданских свобод. Либеральный гуманизм с упором на культуру, искусство и достоинство личности. Политика как функция этики."

 mcksp_christian_democracy: "ХДС"
 mcksp_christian_democracy_desc: "Христианско-демократический союз. Центристская позиция, опирающаяся на традиционные ценности и общественную солидарность. Антивоенный консерватизм."

# communism group sub-ideologies
 mcksp_market_socialism: "НЭС"
 mcksp_market_socialism_desc: "Новый экономический союз. Бухаринский путь — НЭП без сворачивания, кооперация и хозрасчёт при сохранении общественной собственности."

# neutrality group sub-ideologies
 mcksp_pragmatic_syncretism: "БС"
 mcksp_pragmatic_syncretism_desc: "Блок согласия. Прагматический синкретизм без идеологической ригидности. Власть как искусство компромисса между крайностями."

 mcksp_scientific_progressism: "СНП"
 mcksp_scientific_progressism_desc: "Союз научного прогресса. Курс на ускоренное технологическое развитие — авиация, электроника, освоение космоса."

 mcksp_statist_technocratism: "СГП"
 mcksp_statist_technocratism_desc: "Союз государственного порядка. Примат государства над личностью, управление через корпус специалистов. Безопасность и порядок выше личных свобод."

 mcksp_national_conservatism: "РДС"
 mcksp_national_conservatism_desc: "Русский державный союз. Сильная держава, традиция, иерархия. Православие, армия, народ — три столпа национального возрождения."

# fascism group sub-ideologies (тёмный финал)
 mcksp_technocratic_order: "ТО"
 mcksp_technocratic_order_desc: "Технократический орден. Вырожденная форма этатистского технократизма: тоталитарная диктатура корпуса инженеров, безусловное превосходство «компетентных» над массами."
