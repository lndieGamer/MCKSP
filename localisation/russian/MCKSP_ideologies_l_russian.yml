l_russian:
# MCKSP Mod - Russian ideologies localisation file

# Подыдеологии группы democratic
 mcksp_social_liberalism: "Социал-либерализм"
 mcksp_social_liberalism_desc: "Сочетание буржуазно-демократических установок с уравнительными. Светский гуманизм с примером личной свободы и культом саморазвития."

 mcksp_liberal_humanism: "Либеральный гуманизм"
 mcksp_liberal_humanism_desc: "Культурный либерализм с упором на искусство, эстетику и достоинство личности. Политика как функция этики, а не наоборот."

 mcksp_christian_democracy: "Христианская демократия"
 mcksp_christian_democracy_desc: "Центристская позиция, опирающаяся на традиционные ценности и общественную солидарность. Антивоенный консерватизм."

# Подыдеологии группы communism
 mcksp_market_socialism: "Рыночный социализм"
 mcksp_market_socialism_desc: "Бухаринский путь: НЭП без сворачивания, кооперация и хозрасчёт при сохранении общественной собственности на средства производства."

# Подыдеологии группы neutrality
 mcksp_pragmatic_syncretism: "Прагматический синкретизм"
 mcksp_pragmatic_syncretism_desc: "Коалиционный реализм без идеологической ригидности. Власть как искусство компромисса между крайностями."

 mcksp_scientific_progressism: "Научно-индустриальный прогрессизм"
 mcksp_scientific_progressism_desc: "Курс на ускоренное технологическое развитие — авиация, электроника, освоение космоса. Политика подчинена научно-техническому прогрессу."

 mcksp_statist_technocratism: "Этатистский технократизм"
 mcksp_statist_technocratism_desc: "Примат государства над личностью, управление через корпус специалистов. Безопасность и порядок выше личных свобод."

 mcksp_national_conservatism: "Державный национал-консерватизм"
 mcksp_national_conservatism_desc: "Сильная держава, традиция, иерархия. Православие, армия, народ — три столпа национального возрождения."

# Подыдеологии группы fascism (тёмный финал)
 mcksp_technocratic_order: "Технократический орден"
 mcksp_technocratic_order_desc: "Вырожденная форма этатистского технократизма: тоталитарная диктатура корпуса инженеров, безусловное превосходство «компетентных» над массами."
