l_russian:
# MCKSP Mod - Russian ideologies localisation file
#
# Имена и описания 8 MCKSP-идеологий — СТАТИЧНЫЕ. HOI4 не оценивает
# scripted_localisation в ideology-локалях (проверено: engine читает
# "[Root.GetXxx]" как литеральное имя группы и валит в ideology.cpp).
#
# Скрытие до активации делается через initial set_party_name = MCKSP_redacted
# в common/on_actions/MCKSP_on_actions.txt (on_startup для every_country).
# Это перекрывает parties_grid + сектора круга. activate_guests_system
# затем переопределяет SOV-набор реальными именами партий (СДС/ЛГС/...).
#
# Окно идеологии (попап при клике на партию) использует ЭТУ локаль напрямую —
# scripted_loc там не работает, поэтому показывает реальное имя/описание
# даже до активации, если игрок специально откроет 0%-партию (мелкая утечка).

 mcksp_social_liberalism: "Социальный либерализм"
 mcksp_social_liberalism_desc: "Доктрина прогрессивной демократии. Социальное государство, гражданские свободы, регулируемый рынок, активная роль государства в обеспечении равенства возможностей."
 mcksp_social_liberalism_t: "Социальный либерализм"
 mcksp_social_liberalism_t_desc: "Доктрина прогрессивной демократии. Социальное государство, гражданские свободы, регулируемый рынок, активная роль государства в обеспечении равенства возможностей."

 mcksp_liberal_humanism: "Либеральный гуманизм"
 mcksp_liberal_humanism_desc: "Гуманистический либерализм с акцентом на правах человека, многообразии и толерантности. Минимальное вмешательство государства в личные дела, защита уязвимых групп."
 mcksp_liberal_humanism_t: "Либеральный гуманизм"
 mcksp_liberal_humanism_t_desc: "Гуманистический либерализм с акцентом на правах человека, многообразии и толерантности. Минимальное вмешательство государства в личные дела, защита уязвимых групп."

 mcksp_christian_democracy: "Христианская демократия"
 mcksp_christian_democracy_desc: "Союз христианских ценностей с социальной демократией. Семья, традиция, солидарность, социальная справедливость через коллективную ответственность."
 mcksp_christian_democracy_t: "Христианская демократия"
 mcksp_christian_democracy_t_desc: "Союз христианских ценностей с социальной демократией. Семья, традиция, солидарность, социальная справедливость через коллективную ответственность."

 mcksp_market_socialism: "Рыночный социализм"
 mcksp_market_socialism_desc: "Социализм с рыночными механизмами. Общественная собственность на ключевые отрасли, рыночное распределение в потребительском секторе, рабочее самоуправление."
 mcksp_market_socialism_t: "Рыночный социализм"
 mcksp_market_socialism_t_desc: "Социализм с рыночными механизмами. Общественная собственность на ключевые отрасли, рыночное распределение в потребительском секторе, рабочее самоуправление."

 mcksp_pragmatic_syncretism: "Прагматичный синкретизм"
 mcksp_pragmatic_syncretism_desc: "Синтез разных идеологических традиций. Прагматичный подход к управлению, отказ от догматизма, выбор лучшего из противоположных систем по обстоятельствам."
 mcksp_pragmatic_syncretism_t: "Прагматичный синкретизм"
 mcksp_pragmatic_syncretism_t_desc: "Синтез разных идеологических традиций. Прагматичный подход к управлению, отказ от догматизма, выбор лучшего из противоположных систем по обстоятельствам."

 mcksp_scientific_progressism: "Научный прогрессизм"
 mcksp_scientific_progressism_desc: "Идеология научно-технического прогресса. Эффективное управление на основе данных, инвестиции в науку и образование, рациональное планирование."
 mcksp_scientific_progressism_t: "Научный прогрессизм"
 mcksp_scientific_progressism_t_desc: "Идеология научно-технического прогресса. Эффективное управление на основе данных, инвестиции в науку и образование, рациональное планирование."

 mcksp_statist_technocratism: "Государственная технократия"
 mcksp_statist_technocratism_desc: "Сильное государство, управляемое технократической элитой. Меритократия, плановая экономика, централизованное принятие решений на научной основе."
 mcksp_statist_technocratism_t: "Государственная технократия"
 mcksp_statist_technocratism_t_desc: "Сильное государство, управляемое технократической элитой. Меритократия, плановая экономика, централизованное принятие решений на научной основе."

 mcksp_national_conservatism: "Национальный консерватизм"
 mcksp_national_conservatism_desc: "Защита национальной идентичности, традиций и суверенитета. Сильное государство, традиционные ценности, экономический патриотизм."
 mcksp_national_conservatism_t: "Национальный консерватизм"
 mcksp_national_conservatism_t_desc: "Защита национальной идентичности, традиций и суверенитета. Сильное государство, традиционные ценности, экономический патриотизм."

# Заглушка для set_party_name. До флага guests_active engine использует это
# как имя/long_name партий MCKSP-групп. § коды: §R красный, §! сброс.
 MCKSP_redacted: "§RЗАПРЕЩЕНО§!"
 MCKSP_redacted_desc: "Сведения о данной политической группе отсутствуют в реестре НКВД. Доступ к материалам приостановлен."

# ТО — не отдельная группа, а тёмная трансформация РДС через decision.
 mcksp_technocratic_order: "ТО"
 mcksp_technocratic_order_desc: "Технократический орден. Вырожденная форма державного национал-консерватизма: тоталитарная диктатура корпуса инженеров, безусловное превосходство «компетентных» над массами."

# PLACEHOLDER идеологии для Артёма и Ильгама — переименовать когда определится концепция.
 mcksp_placeholder_artem: "Партия Аюшеева"
 mcksp_placeholder_artem_desc: "PLACEHOLDER. Идеология партии Артёма Аюшеева — пока без определённой концепции."
 mcksp_placeholder_artem_t: "Партия Аюшеева"
 mcksp_placeholder_artem_t_desc: "PLACEHOLDER. Идеология партии Артёма Аюшеева — пока без определённой концепции."

 mcksp_placeholder_ilgam: "Партия Фагаманова"
 mcksp_placeholder_ilgam_desc: "PLACEHOLDER. Идеология партии Ильгама Фагаманова — пока без определённой концепции."
 mcksp_placeholder_ilgam_t: "Партия Фагаманова"
 mcksp_placeholder_ilgam_t_desc: "PLACEHOLDER. Идеология партии Ильгама Фагаманова — пока без определённой концепции."
