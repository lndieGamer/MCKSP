 # --- Контест (struggle_event.1) ---
 struggle_event.1.t: "Спор за сторонника"
 struggle_event.1.d: "[GetContestGuestName] уже примкнул к коалиции «[GetContestCoal]». Мы ещё можем перетянуть его на свою сторону - но вербовщик так просто не уступит."
 struggle_event.1.a: "Пойти на компромисс: -½ нашей популярности, ×2 ему - и он наш"
 struggle_event.1.b: "Ничего не делать: +2% нам, он остаётся у соперника"
 # --- Оповещение: вступление ---
 struggle_event.2.t: "Новый сторонник"
 struggle_event.2.d: "[GetJoinGuestName] примкнул к коалиции «[GetJoinCoal]»."
 struggle_event.2.a: "Учтём"
 # --- Оповещение: коалиция сформирована ---
 struggle_event.3.t: "Коалиция сформирована"
 struggle_event.3.d: "Коалиция «[GetJoinCoal]» оформилась как сила в борьбе за власть."
 struggle_event.3.a: "Хорошо"


