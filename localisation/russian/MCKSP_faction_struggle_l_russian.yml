 # --- Фаза 1: серые ходы соперников ---
 SOV_struggle_rival_move_reformers: "§RРеформисты вербуют сторонника§!"
 SOV_struggle_rival_move_reformers_desc: "Коалиция реформистов привлекает нового гостя."
 SOV_struggle_rival_move_statists: "§RГосударственники вербуют сторонника§!"
 SOV_struggle_rival_move_statists_desc: "Коалиция государственников привлекает нового гостя."
 SOV_struggle_rival_move_centrists: "§RЦентристы вербуют сторонника§!"
 SOV_struggle_rival_move_centrists_desc: "Коалиция центристов привлекает нового гостя."
 SOV_struggle_rival_move_socialists: "§RСоциалисты вербуют сторонника§!"
 SOV_struggle_rival_move_socialists_desc: "Коалиция социалистов привлекает нового гостя."

