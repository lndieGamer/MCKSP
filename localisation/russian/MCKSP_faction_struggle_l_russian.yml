 SOV_struggle_invite_cost_ilgam_blocked: "£pol_power  §R[?mcksp_invite_cost_ilgam]§!"
 SOV_struggle_invite_arseny: "Пригласить Арсения в коалицию"
 SOV_struggle_invite_arseny_desc: "Предложить Арсению Павлову (ЛГС) вступить в вашу коалицию. Стоимость растёт с расстоянием на компасе. Вступление произойдёт по истечении таймера."
 SOV_struggle_invite_gleb: "Пригласить Глеба в коалицию"
 SOV_struggle_invite_gleb_desc: "Предложить Глебу Рычкову (БС) вступить в вашу коалицию."
 SOV_struggle_invite_ivan: "Пригласить Ивана в коалицию"
 SOV_struggle_invite_ivan_desc: "Предложить Ивану Данченко (СНП) вступить в вашу коалицию."
 SOV_struggle_invite_ilya: "Пригласить Илью в коалицию"
 SOV_struggle_invite_ilya_desc: "Предложить Илье Попову (СГП) вступить в вашу коалицию."
 SOV_struggle_invite_artem: "Пригласить Артёма в коалицию"
 SOV_struggle_invite_artem_desc: "Предложить Артёму Аюшееву вступить в вашу коалицию."
 SOV_struggle_invite_ilgam: "Пригласить Ильгама в коалицию"
 SOV_struggle_invite_ilgam_desc: "Предложить Ильгаму Фагаманову вступить в вашу коалицию."

 # --- Фаза 1: сдвиг «я» ---
 SOV_struggle_shift_self: "Сменить своё «я»"
 SOV_struggle_shift_self_desc: "Передать роль ядра другому члену своей коалиции. Коалиция при этом не меняется."
 SOV_struggle_shift_self_pick_nikita: "Стать Никитой"
 SOV_struggle_shift_self_pick_arseny: "Стать Арсением"
 SOV_struggle_shift_self_pick_demokrit: "Стать Демокритом"
