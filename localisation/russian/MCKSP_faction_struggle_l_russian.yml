 # --- Фаза 3: приход к власти (стубы) ---
 SOV_struggle_grab_reformers: "Импичмент в рядах ВКП(б)"
 SOV_struggle_grab_reformers_desc: "Реформисты набирают популярность среди партийцев, чтобы мягко сместить Сталина."
 SOV_struggle_grab_reformers_tt: "Влияние реформистов в ВКП(б) растёт. [СКЕЛЕТ: эффект будет дополнен.]"
 SOV_struggle_grab_statists_institutes: "Ультиматум Кремлю от интеллигенции"
 SOV_struggle_grab_statists_institutes_desc: "Под руководством Ильи или Ивана государственники опираются на НИИ и институты."
 SOV_struggle_grab_statists_institutes_tt: "Институты и НИИ на вашей стороне. [СКЕЛЕТ.]"
 SOV_struggle_grab_statists_army: "Опора на армию и спецслужбы"
 SOV_struggle_grab_statists_army_desc: "Государственники приходят к власти на штыках."
 SOV_struggle_grab_statists_army_tt: "Армия и спецслужбы на вашей стороне. [СКЕЛЕТ.]"
 SOV_struggle_grab_centrists: "Пропаганда среди населения"
 SOV_struggle_grab_centrists_desc: "Центристы ведут агитацию в городе и деревне и приходят как компромисс после митингов."
 SOV_struggle_grab_centrists_tt: "Митинги и протесты выводят центристов вперёд. [СКЕЛЕТ.]"
 SOV_struggle_grab_socialists: "Инфильтрация в ряды ВКП(б)"
 SOV_struggle_grab_socialists_desc: "Социалисты проникают в партийный аппарат."
 SOV_struggle_grab_socialists_tt: "Социалисты усиливаются в ВКП(б). [СКЕЛЕТ.]"
 SOV_struggle_phase3_loser_build: "Копить влияние для борьбы"
 SOV_struggle_phase3_loser_build_desc: "Ваша коалиция проиграла гонку. Накопите влияние, чтобы выйти на паритет к фазе 4."
 SOV_struggle_phase3_loser_build_tt: "Влияние вашей коалиции растёт. [СКЕЛЕТ.]"

 # --- Фаза 4: развязка (стубы) ---
 SOV_struggle_endgame_winner_offer: "Предложить присоединиться"
 SOV_struggle_endgame_winner_offer_desc: "Победитель предлагает проигравшей коалиции войти в его состав."
 SOV_struggle_endgame_winner_offer_tt: "Предложение об интеграции отправлено. [СКЕЛЕТ.]"
 SOV_struggle_endgame_winner_purge: "Очернить и устранить"
 SOV_struggle_endgame_winner_purge_desc: "Снизить репутацию неугодного и открыть изгнание, заключение или расстрел."
 SOV_struggle_endgame_winner_purge_tt: "Репутация цели падает. [СКЕЛЕТ.]"
 SOV_struggle_endgame_loser_cwprep: "Готовить восстание"
 SOV_struggle_endgame_loser_cwprep_desc: "Проигравшая коалиция готовит гражданскую войну. Она начнётся через 180 дней."
 SOV_struggle_endgame_loser_cwprep_tt: "Подготовка восстания начата. [СКЕЛЕТ: ГВ через 180 дней.]"
 SOV_struggle_endgame_loser_pull: "Перетянуть другую коалицию"
 SOV_struggle_endgame_loser_pull_desc: "Склонить нейтральную или проигравшую коалицию на свою сторону перед ГВ."
 SOV_struggle_endgame_loser_pull_tt: "Переговоры с другой коалицией. [СКЕЛЕТ.]"
 SOV_struggle_endgame_loser_demilitarize: "Демилитаризовать тыл"
 SOV_struggle_endgame_loser_demilitarize_desc: "Зауралье, Север до Петрозаводска, Казахстан и Средняя Азия становятся ДМЗ — ГВ идёт в Европе."
 SOV_struggle_endgame_loser_demilitarize_tt: "Тыловые регионы демилитаризованы. [СКЕЛЕТ.]"
 SOV_struggle_cw_start_tt: "Гражданская война начинается! [СКЕЛЕТ.]"

