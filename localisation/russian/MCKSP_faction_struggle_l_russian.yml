l_russian:
# MCKSP Mod - Фракционная борьба (5 фаз)

 # --- Категории решений ---
 SOV_MCKSP_struggle_cat: "Борьба идеологий"
 SOV_MCKSP_struggle_cat_desc: "Гости из будущего сплотились в соперничающие коалиции и повели борьбу за власть в СССР. Формируйте союзы, продвигайте своих сторонников и ведите фракцию к торжеству — пока конкуренты делают то же самое за вашей спиной."
 SOV_MCKSP_struggle_intro_cat: "Борьба идеологий"
 SOV_MCKSP_struggle_intro_cat_desc: "Пришло время определиться. Откройте политический компас и кликните по одному из четырёх ядер — этот выбор решит, какую коалицию вы возглавите в грядущей борьбе."
 SOV_MCKSP_struggle_debug_cat: "Борьба идеологий [ОТЛАДКА]"
 SOV_MCKSP_struggle_debug_cat_desc: "Отладочные решения для быстрой проверки фаз борьбы фракций."

 # --- Фаза 0 ---
 SOV_struggle_choose_faction_banner: "§RНЕОБХОДИМО ВЫБРАТЬ ВАШУ ФРАКЦИЮ§!"
 SOV_struggle_choose_faction_banner_desc: "Откройте политический компас и кликните по одной из четырёх точек-ядер (Никита — реформисты, Евгений — государственники, Степан — центристы, Демокрит — социалисты), чтобы выбрать своё «я» и коалицию."

 # --- Фаза 1: приглашения ---
 SOV_struggle_invite_cost: "Политическая сила (зависит от близости на компасе)"
