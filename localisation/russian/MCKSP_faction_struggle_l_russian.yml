 # --- Фаза 2: клевета ---
 SOV_struggle_slander: "Очернить соперника"
 SOV_struggle_slander_desc: "Снизить популярность гостя из чужой коалиции ценой доверия Сталина."
 SOV_struggle_slander_pick_nikita: "Очернить Никиту"
 SOV_struggle_slander_pick_arseny: "Очернить Арсения"
