# 小褞卸械褌薪褘械 懈胁械薪褌褘 - 薪邪褔邪谢芯
 start_event.1.t: "小褌褉邪薪薪褘泄 写芯泻谢邪写"
 start_event.1.d: "孝褟卸械谢褘械 褕邪谐懈 褝褏芯屑 芯褌写邪褞褌褋褟 胁 泻芯褉懈写芯褉邪褏 小械薪邪褌褋泻芯谐芯 写胁芯褉褑邪. 袚械薪褉懈褏 携谐芯写邪, 薪邪褉泻芯屑 胁薪褍褌褉械薪薪懈褏 写械谢, 褋锌械褕薪芯 锌芯写薪懈屑邪械褌褋褟 锌芯 谢械褋褌薪懈褑械, 薪械褋褟 胁 褉褍泻邪褏 锌邪锌泻褍 褋 泻褉邪褋薪芯泄 锌械褔邪褌褜褞 芦小袨袙袝袪楔袝袧袧袨 小袝袣袪袝孝袧袨禄. 袝谐芯 芯斜褘褔薪芯 薪械胁芯蟹屑褍褌懈屑芯械 谢懈褑芯 胁褘写邪械褌 械写胁邪 蟹邪屑械褌薪芯械 斜械褋锌芯泻芯泄褋褌胁芯, 泻芯谐写邪 芯薪 锌芯写褏芯写懈褌 泻 泻邪斜懈薪械褌褍 袠芯褋懈褎邪 小褌邪谢懈薪邪. 袨薪 褋褌褍褔懈褌 胁 写胁械褉褜 泻邪斜懈薪械褌邪. 袟薪邪泻芯屑褘泄 谐芯谢芯褋 褉邪蟹褉械褕邪械褌 胁芯泄褌懈.\n- 孝芯胁邪褉懈褖 小褌邪谢懈薪, - 携谐芯写邪 泻谢邪写械褌 锌邪锌泻褍 薪邪 屑邪褋褋懈胁薪褘泄 写褍斜芯胁褘泄 褋褌芯谢.\n- 袙褘薪褍卸写械薪 写芯谢芯卸懈褌褜 芯 胁械褋褜屑邪... 薪械芯斜褘褔薪芯屑 锌褉芯懈褋褕械褋褌胁懈懈. 携 锌褉芯褕褍 锌褉芯褖械薪懈褟 蟹邪 褋褌芯谢褜 锌芯蟹写薪懈泄 胁懈蟹懈褌, 薪芯 褋懈褌褍邪褑懈褟 褌褉械斜褍械褌 胁邪褕械谐芯 胁薪懈屑邪薪懈褟.\n袠芯褋懈褎 袙懈褋褋邪褉懈芯薪芯胁懈褔 薪械 锌芯写薪懈屑邪械褌 谐谢邪蟹 芯褌 写芯泻褍屑械薪褌芯胁, 谢懈褕褜 褍泻邪蟹褘胁邪械褌 薪邪 褋褌褍谢 薪邪锌褉芯褌懈胁. 携谐芯写邪 褋邪写懈褌褋褟, 芯褌泻褉褘胁邪械褌 锌邪锌泻褍 写褉芯卸邪褖懈屑懈 芯褌 薪邪锌褉褟卸械薪懈褟 锌邪谢褜褑邪屑懈.\n- 袙褔械褉邪 胁械褔械褉芯屑 胁 小芯泻芯谢褜薪懈泻邪褏 薪邪褕懈 谢褞写懈 芯斜薪邪褉褍卸懈谢懈 锌褉械写屑械褌, 锌褉芯懈褋褏芯卸写械薪懈械 泻芯褌芯褉芯谐芯... - 芯薪 写械谢邪械褌 锌邪褍蟹褍, - 褍褋褌邪薪芯胁懈褌褜 薪械 褍写邪械褌褋褟.\n袙芯卸写褜 薪邪泻芯薪械褑 芯褌褉褘胁邪械褌褋褟 芯褌 斜褍屑邪谐, 械谐芯 锌褉芯薪懈褑邪褌械谢褜薪褘械 谐谢邪蟹邪 褍褋褌褉械屑谢褟褞褌褋褟 薪邪 携谐芯写褍.\n- 袠 胁褘 褋褔懈褌邪械褌械, 褔褌芯 褝褌芯 褌褉械斜褍械褌 屑芯械谐芯 胁薪懈屑邪薪懈褟, 褌芯胁邪褉懈褖 携谐芯写邪? 袩芯褔械屑褍 胁褘 褉械褕懈谢懈, 褔褌芯 写械谢褍 芯.. 锌褉芯锌邪卸械 薪褍卸薪芯 锌褉懈褋胁芯懈褌褜 - 芯薪 泻懈胁薪褍谢 薪邪 锌邪锌泻褍 - 褌邪泻芯泄 胁褘褋芯泻懈泄 褍褉芯胁械薪褜 褋械泻褉械褌薪芯褋褌懈?\n袝谐芯 褋芯斜械褋械写薪懈泻 斜褍写褌芯 褋卸邪谢褋褟 锌芯写 褋褌邪谢褜薪褘屑 胁蟹谐谢褟写芯屑.\n- 袛械谢芯 胁 械谐芯 薪械芯斜褗褟褋薪懈屑芯泄 锌褉懈褉芯写械. 袩褉芯褎械褋褋芯褉邪 袙褋械褋芯褞蟹薪芯谐芯 褝谢械泻褌褉芯褌械褏薪懈褔械褋泻芯谐芯 懈薪褋褌懈褌褍褌邪, 泻芯褌芯褉褘屑 屑褘 芯褌写邪谢懈 锌褉械写屑械褌 薪邪 褝泻褋锌械褉褌懈蟹褍, 褍卸械 薪械褋泻芯谢褜泻芯 写薪械泄 薪械 屑芯谐褍褌 褋泻邪蟹邪褌褜 薪邪屑 薪懈褔械谐芯 芯锌褉械写械谢械薪薪芯谐芯. 袨薪懈 胁褋泻褉褘谢懈 褍褋褌褉芯泄褋褌胁芯 懈 锌芯锌褘褌邪谢懈褋褜 芯锌褉械写械谢懈褌褜 械谐芯 锌褉懈褉芯写褍. 袝写懈薪褋褌胁械薪薪芯械, 褔褌芯 芯薪懈 褋屑芯谐谢懈 褍褋褌邪薪芯胁懈褌褜 - 褌邪泻 褝褌芯 褌芯, 褔褌芯 芯薪芯 懈褋锌芯谢褜蟹褍械褌 褉邪写懈芯胁芯谢薪褘 写谢褟 锌械褉械写邪褔懈 写邪薪薪褘褏. 袧芯 褝褌芯 械写胁邪 谢懈 芯写薪邪 写械褋褟褌邪褟 芯褌 褌芯谐芯, 褔褌芯 屑褘 写芯谢卸薪褘 蟹薪邪褌褜! 袧芯 芯薪懈 锌褉芯褋褌芯 褉邪蟹胁芯写褟褌 褉褍泻邪屑懈!\n小褌邪谢懈薪 褋锌芯泻芯泄薪芯 薪邪斜谢褞写邪谢 蟹邪 锌邪薪懈褔械褋泻芯泄 褉械褔褜褞 褋胁芯械谐芯 锌芯写褔懈薪械薪薪芯谐芯.\n- 携 褍褋谢褘褕邪谢 胁邪褕 写芯泻谢邪写, 褌芯胁邪褉懈褖 携谐芯写邪. 袧械褋芯屑薪械薪薪芯, 褝褌芯 胁薪褍褕邪械褌 芯锌褉械写械谢械薪薪芯械 斜械褋锌芯泻芯泄褋褌胁芯, 懈 褟 卸写褍 胁邪褕械谐芯 写邪谢褜薪械泄褕械谐芯 褉邪褋褋谢械写芯胁邪薪懈褟. 袙褘 褋胁芯斜芯写薪褘.\n袧邪褉泻芯屑 胁褋褌邪谢 懈 褋锌械褕薪芯 锌芯泻懈薪褍谢 泻邪斜懈薪械褌, 褔褍胁褋褌胁褍褟 薪邪 褋械斜械 褌褟卸械谢褘泄 胁蟹谐谢褟写. 袩邪锌泻邪 褋 写芯泻谢邪写芯屑 芯褋褌邪谢邪褋褜 谢械卸邪褌褜 薪邪 褋褌芯谢械."
 start_event.1.a: "效褌芯-褌芯 锌褉芯懈褋褏芯写懈褌.."

 start_event.2.t: "袧械芯卸懈写邪薪薪褘泄 褋胁懈写械褌械谢褜"
 start_event.2.d: "袙 褝褌芯褌 褋芯胁械褉褕械薪薪芯 芯斜褘褔薪褘泄 写械薪斜褜 泻 褍褔邪褋褌泻芯胁芯屑褍 锌芯褋褌褍锌懈谢 褋褌褉邪薪薪褘泄 蟹胁芯薪芯泻. 效械谢芯胁械泻 薪邪 写褉褍谐芯屑 泻芯薪褑械 锌褉芯胁芯写邪 褍褌胁械褉卸写邪谢, 褔褌芯 芯薪 斜褘谢 褋胁懈写械褌械谢械屑 褋褌褉邪薪薪芯谐芯 锌褉芯懈褋褕械褋褌胁懈褟 胁 小芯泻芯谢褜薪懈泻邪褏, 泻芯褌芯褉芯械 锌褉芯懈蟹芯褕谢芯 胁 褌褍 卸械 薪芯褔褜. 袨薪 芯锌懈褋邪谢, 泻邪泻 胁懈写械谢 谐褉褍锌锌褍 薪械蟹薪邪泻芯屑褑械胁, 褋褌褉邪薪薪芯 芯写械褌褘褏 懈 褉邪蟹谐芯胁邪褉懈胁邪胁褕懈褏 芯 褋褌褉邪薪薪褘褏 胁械褖邪褏. 袨薪 褍褌胁械褉卸写邪谢, 褔褌芯 褝褌懈 谢褞写懈 斜褘谢懈 芯褕邪褉邪褕械薪褘 懈 写懈蟹芯褉谐邪薪懈蟹芯胁邪薪褘, 薪芯 薪械 褋屑芯谐 锌褉械写芯褋褌邪胁懈褌褜 薪懈泻邪泻懈褏 锌芯写褉芯斜薪芯褋褌械泄 芯 褌芯屑, 泻褌芯 芯薪懈 斜褘谢懈 懈谢懈 芯褌泻褍写邪 芯薪懈 锌褉懈褕谢懈. 协褌芯褌 蟹胁芯薪芯泻 胁褘蟹胁邪谢 薪芯胁褘泄 胁懈褌芯泻 褋谢褍褏芯胁 懈 褋锌械泻褍谢褟褑懈泄 芯 褌芯屑, 褔褌芯 卸械 锌褉芯懈蟹芯褕谢芯 胁 小芯泻芯谢褜薪懈泻邪褏."
 start_event.2.a: "效褌芯-褌芯 锌褉芯懈褋褏芯写懈褌."

 start_event.3.t: "袗褉械褋褌 薪械蟹薪邪泻芯屑褑械胁"
 start_event.3.d: "袙 褉械蟹褍谢褜褌邪褌械 褉邪褋褋谢械写芯胁邪薪懈褟, 胁褘蟹胁邪薪薪芯谐芯 褋褌褉邪薪薪褘屑 锌褉芯懈褋褕械褋褌胁懈械屑 胁 小芯泻芯谢褜薪懈泻邪褏, 斜褘谢懈 邪褉械褋褌芯胁邪薪褘 薪械褋泻芯谢褜泻芯 薪械蟹薪邪泻芯屑褑械胁. 袨薪懈 斜褘谢懈 写芯褋褌邪胁谢械薪褘 胁 袧袣袙袛 写谢褟 写芯锌褉芯褋邪. 携谐芯写邪 谢懈褔薪芯 泻芯薪褌褉芯谢懈褉褍械褌 锌褉芯褑械褋褋, 薪邪写械褟褋褜 胁褘褟褋薪懈褌褜, 泻褌芯 褝褌懈 谢褞写懈 懈 芯褌泻褍写邪 芯薪懈 锌褉懈褕谢懈.小褌邪谢懈薪 褌械屑 胁褉械屑械薪械屑 锌褉芯写芯谢卸邪谢 薪邪斜谢褞写邪褌褜 蟹邪 褉邪蟹胁懈褌懈械屑 褋芯斜褘褌懈泄, 薪械 胁屑械褕懈胁邪褟褋褜 薪邪锌褉褟屑褍褞, 薪芯 胁薪懈屑邪褌械谢褜薪芯 褋谢械写褟 蟹邪 泻邪卸写褘屑 褕邪谐芯屑 携谐芯写褘. 袛芯锌褉芯褋 薪械蟹薪邪泻芯屑褑械胁 芯斜械褖邪械褌 褉邪褋泻褉褘褌褜 薪芯胁褘械 写械褌邪谢懈 芯 褌芯屑, 褔褌芯 锌褉芯懈蟹芯褕谢芯 胁 小芯泻芯谢褜薪懈泻邪褏, 懈 屑芯卸械褌 锌褉芯谢懈褌褜 褋胁械褌 薪邪 蟹邪谐邪写芯褔薪褘械 芯斜褋褌芯褟褌械谢褜褋褌胁邪, 芯泻褉褍卸邪褞褖懈械 褝褌芯 锌褉芯懈褋褕械褋褌胁懈械."
 start_event.3.a: "效褌芯-褌芯 袨袩袪袝袛袝袥袝袧袧袨 锌褉芯懈褋褏芯写懈褌."

 interrogation_event.1.t: "袛芯锌褉芯褋 薪械蟹薪邪泻芯屑褑械胁"
 interrogation_event.1.d: "小褑械薪泻邪"
 interrogation_event.1.a: "协褌懈 谢褞写懈 - 褍谐褉芯蟹邪. 袠褏 薪褍卸薪芯 褍褋褌褉邪薪懈褌褜."
 interrogation_event.1.b: "协褌懈 谢褞写懈 - 薪械胁械褉芯褟褌薪邪褟 胁芯蟹屑芯卸薪芯褋褌褜 写谢褟 薪邪褋. 袦褘 写芯谢卸薪褘 懈褋锌芯谢褜蟹芯胁邪褌褜 懈褏 蟹薪邪薪懈褟!"

#袟薪邪泻芯屑褋褌胁芯 褋 褍褔邪褋褌薪懈泻邪屑懈
 introduction_event.1.t: "袘褍写薪懈 胁 蟹邪泻褉褘褌芯屑 袧袠袠 #14"
 introduction_event.1.d: "袩芯褋谢械 写芯锌褉芯褋邪 懈 薪邪锌褉邪胁谢械薪懈褟 胁褋械褏 蟹邪写械褉卸邪薪薪褘褏 胁 蟹邪泻褉褘褌褘泄 袧袠袠 胁褋械褏 懈褏 褉邪褋锌褉械写械谢懈谢懈 锌芯 谐褉褍锌锌邪屑 胁 蟹邪胁懈褋懈屑芯褋褌懈 芯褌 懈褏 锌褉械写锌芯谢邪谐邪械屑芯泄 褑械薪薪芯褋褌懈 懈 斜谢邪谐芯薪邪写褢卸薪芯褋褌懈. 孝械锌械褉褜 懈屑 锌褉械写褋褌芯懈褌 锌褉芯胁械褋褌懈 薪械泻芯褌芯褉芯械 胁褉械屑褟 胁 懈蟹芯谢褟褑懈懈, 芯卸懈写邪褟 写邪谢褜薪械泄褕懈褏 褉邪褋锌芯褉褟卸械薪懈泄. 袙 褝褌芯 胁褉械屑褟 褋芯褌褉褍写薪懈泻懈 袧袣袙袛 斜褍写褍褌 胁薪懈屑邪褌械谢褜薪芯 薪邪斜谢褞写邪褌褜 蟹邪 薪懈屑懈, 褋芯斜懈褉邪褟 懈薪褎芯褉屑邪褑懈褞 懈 芯褑械薪懈胁邪褟 懈褏 锌芯褌械薪褑懈邪谢 写谢褟 懈褋锌芯谢褜蟹芯胁邪薪懈褟 胁 懈薪褌械褉械褋邪褏 谐芯褋褍写邪褉褋褌胁邪."
 introduction_event.1.a: "袙褉械屑褟 锌褉芯褔懈褌邪褌褜 懈褏 写芯褋褜械"
 introduction_event.1.b: "袣 褔械褉褌褍 写芯泻褍屑械薪褌褘, 锌芯褉邪 锌懈褌褜 褔邪泄."

 introduction_event.2.t: "袛芯褋褜械 薪邪 谐褉. 携泻褍褕懈薪邪"
 introduction_event.2.d: "搂R小袨袙袝袪楔袝袧袧袨 小袝袣袪袝孝袧袨搂!\n袧袣袙袛 小小小袪\n\n袛袨小鞋袝 #15431\n\n肖袗袦袠袥袠携, 袠袦携, 袨孝效袝小孝袙袨: 携泻褍褕懈薪 袧懈泻懈褌邪 小械褉谐械械胁懈褔\n袛袗孝袗 袪袨袞袛袝袧袠携: 10.12.2004\n袦袝小孝袨 袪袨袞袛袝袧袠携: 谐. 袦芯褋泻胁邪\n袙袨袟袪袗小孝: 21 锌芯谢薪褘泄 谐芯写\n\n搂R袨小袨袘蝎袝 袧袗袙蝎袣袠 袠 袟袧袗袧袠携:搂! 小锌械褑懈邪谢懈褋褌 锌芯 褝谢械泻褌褉芯薪薪芯-胁褘褔懈褋谢懈褌械谢褜薪褘屑 褍褋褌褉芯泄褋褌胁邪屑 薪械褍褋褌邪薪芯胁谢械薪薪芯谐芯 芯斜褉邪蟹褑邪. 袪邪褋锌芯谢邪谐邪械褌 芯斜褕懈褉薪褘屑懈 锌芯蟹薪邪薪懈褟屑懈 胁 芯斜谢邪褋褌懈 褋褔褢褌薪芯-谢芯谐懈褔械褋泻懈褏 屑邪褕懈薪, 锌褉懈褉芯写邪 懈 薪邪蟹薪邪褔械薪懈械 泻芯褌芯褉褘褏 褋芯胁褉械屑械薪薪芯泄 薪邪褍泻械 薪械懈蟹胁械褋褌薪褘. 笑械薪薪芯褋褌褜 褋胁械写械薪懈泄 胁 锌芯谢薪芯泄 屑械褉械 薪械 芯锌褉械写械谢械薪邪 胁胁懈写褍 懈褏 芯锌械褉械卸邪褞褖械谐芯 褏邪褉邪泻褌械褉邪.\n\n搂R袨袩袠小袗袧袠袝 袥袠效袧袨小孝袠:搂!\n啸袗袪袗袣孝袝袪: 袦械谢邪薪褏芯谢懈褔械褋泻芯谐芯 褋泻谢邪写邪, 蟹邪屑泻薪褍褌, 褋泻谢芯薪械薪 泻 芯褌胁谢械褔褢薪薪褘屑 褉邪褋褋褍卸写械薪懈褟屑. 袩褉懈 褝褌芯屑 胁 褋褉械写械 蟹邪写械褉卸邪薪薪褘褏 锌褉芯褟胁谢褟械褌 薪邪懈斜芯谢褜褕褍褞 褉械褔械胁褍褞 邪泻褌懈胁薪芯褋褌褜 - 锌褉芯褌懈胁芯褉械褔懈械, 锌芯写谢械卸邪褖械械 薪邪斜谢褞写械薪懈褞. 小褋褘谢邪械褌褋褟 薪邪 薪械褍褋褌邪薪芯胁谢械薪薪褍褞 褋懈褋褌械屑褍 芯锌褉械写械谢械薪懈褟 褌懈锌邪 谢懈褔薪芯褋褌懈.\n袩袨袥袠孝袠效袝小袣袠袝 袙袟袚袥携袛蝎: 袩褉懈写械褉卸懈胁邪械褌褋褟 胁蟹谐谢褟写芯胁, 芯锌褉械写械谢褟械屑褘褏 懈屑 泻邪泻 芦褋芯褑懈邪谢-谢懈斜械褉邪谢褜薪褘械禄: 褋芯褔械褌邪薪懈械 斜褍褉卸褍邪蟹薪芯-写械屑芯泻褉邪褌懈褔械褋泻懈褏 褍褋褌邪薪芯胁芯泻 褋 褍褉邪胁薪懈褌械谢褜薪褘屑懈. 袠褋锌芯胁械写褍械褌 褋胁械褌褋泻懈泄 谐褍屑邪薪懈蟹屑. 袩褉械胁褘褕械 锌褉芯褔械谐芯 褋褌邪胁懈褌 谢懈褔薪褍褞 泻邪褉褜械褉褍 懈 屑邪褌械褉懈邪谢褜薪褘泄 写芯褋褌邪褌芯泻, 褔褌芯 褍泻邪蟹褘胁邪械褌 薪邪 屑械褖邪薪褋泻懈械, 褋褌褟卸邪褌械谢褜褋泻懈械 薪邪泻谢芯薪薪芯褋褌懈. 袟邪褟胁谢褟械褌 芯 斜械蟹褍褋谢芯胁薪芯屑 芯褌泻邪蟹械 芯褌 胁芯泄薪褘 胁 谢褞斜芯泄 褎芯褉屑械, 胁泻谢褞褔邪褟 芯斜芯褉芯薪褍 谐芯褋褍写邪褉褋褌胁邪. 袩芯褉邪卸械薪褔械褋泻懈械 薪邪褋褌褉芯械薪懈褟 胁 褍褋谢芯胁懈褟褏 泻邪锌懈褌邪谢懈褋褌懈褔械褋泻芯谐芯 芯泻褉褍卸械薪懈褟 谐褉邪薪懈褔邪褌 褋 泻芯薪褌褉褉械胁芯谢褞褑懈芯薪薪褘屑懈.\n袩袨袙袝袛袝袧袠袝 袩袪袠 袛袨袩袪袨小袝: 小锌芯泻芯械薪, 锌褉懈蟹薪邪泻芯胁 褋褌褉邪褏邪 薪械 芯斜薪邪褉褍卸懈胁邪械褌. 袙褋褌褍锌邪械褌 胁 锌褉械褉械泻邪薪懈褟 褋芯 褋谢械写芯胁邪褌械谢械屑, 芯褋锌邪褉懈胁邪械褌 芯褋薪芯胁褘 褋芯胁械褌褋泻芯谐芯 褋褌褉芯褟. 袟邪锌懈褉邪褌械谢褜褋褌胁邪 懈 褉邪褋泻邪褟薪懈褟 薪械 芯褌屑械褔械薪芯.\n袩袨孝袝袧笑袠袗袥鞋袧袗携 笑袝袧袧袨小孝鞋 袛袥携 小小小袪: 袙蝎小袨袣袗携\n袩袨袥袠孝袠效袝小袣袗携 袘袥袗袚袨袧袗袛袝袞袧袨小孝鞋: 袣袪袗袡袧袝 袧袠袟袣袗携\n搂R袟袗袣袥挟效袝袧袠袝:搂! 袙褘褋芯泻邪褟 薪邪褍褔薪邪褟 褑械薪薪芯褋褌褜 锌褉懈 胁褘褉邪卸械薪薪芯泄 懈写械芯谢芯谐懈褔械褋泻芯泄 胁褉邪卸写械斜薪芯褋褌懈. 袠褋锌芯谢褜蟹芯胁邪薪懈械 写芯锌褍褋褌懈屑芯 褌芯谢褜泻芯 胁 褍褋谢芯胁懈褟褏 懈蟹芯谢褟褑懈懈 懈 锌芯褋褌芯褟薪薪芯谐芯 薪邪写蟹芯褉邪, 褋邪屑芯褋褌芯褟褌械谢褜薪邪褟 写械褟褌械谢褜薪芯褋褌褜 懈褋泻谢褞褔械薪邪. 袙 斜褘褌褍 芯褌屑械褔械薪褘 褔械褉褌褘, 薪械褋芯胁屑械褋褌懈屑褘械 褋 芯斜谢懈泻芯屑 褋芯胁械褌褋泻芯谐芯 谐褉邪卸写邪薪懈薪邪. 袨褌 褕懈褉芯泻芯谐芯 芯斜褖械薪懈褟 芯谐褉邪写懈褌褜.\n袧袗袪袣袨袦 袙袧校孝袪袝袧袧袠啸 袛袝袥 袚.袚. 携谐芯写邪"
 introduction_event.2.a: "袛邪 褍卸, 薪械芯斜褘褔薪褘泄 谐褉邪卸写邪薪懈薪..."

 introduction_event.3.t: "袛芯褋褜械 薪邪 谐褉. 袩芯锌芯胁邪"
 introduction_event.3.d: "搂R小袨袙袝袪楔袝袧袧袨 小袝袣袪袝孝袧袨搂!\n袧袣袙袛 小小小袪\n\n袛袨小鞋袝 #15432\n\n肖袗袦袠袥袠携, 袠袦携, 袨孝效袝小孝袙袨: 袩芯锌芯胁 袠谢褜褟 -\n袛袗孝袗 袪袨袞袛袝袧袠携: 07.12.2006\n袦袝小孝袨 袪袨袞袛袝袧袠携: 谐. 袦邪泄泻芯锌\n袙袨袟袪袗小孝: 18 锌芯谢薪褘褏 谢械褌\n\n搂R袨小袨袘蝎袝 袧袗袙蝎袣袠 袠 袟袧袗袧袠携:搂! 小锌械褑懈邪谢懈褋褌 锌芯 芯褏褉邪薪械 褋械泻褉械褌薪褘褏 褋胁械写械薪懈泄 懈 锌褉芯褌懈胁芯写械泄褋褌胁懈褞 懈褏 褏懈褖械薪懈褞. 小胁械写褍褖 胁 褕懈褎褉芯胁邪谢褜薪芯屑 写械谢械 懈 蟹邪褖懈褌械 写邪薪薪褘褏 谐芯褋褍写邪褉褋褌胁械薪薪芯泄 胁邪卸薪芯褋褌懈. 袨斜谢邪褋褌褜 蟹薪邪薪懈泄 锌褉械写褋褌邪胁谢褟械褌 锌褉褟屑芯泄 懈薪褌械褉械褋 写谢褟 芯褉谐邪薪芯胁. 袩褉邪泻褌懈褔械褋泻邪褟 褑械薪薪芯褋褌褜 胁褘褋芯泻邪褟.\n\n搂R袨袩袠小袗袧袠袝 袥袠效袧袨小孝袠:搂!\n啸袗袪袗袣孝袝袪: 小邪薪谐胁懈薪懈泻. 袗泻褌懈胁械薪, 胁 芯斜褋褍卸写械薪懈褟褏 褍褔邪褋褌胁褍械褌 褔邪褖械 锌褉芯褔懈褏. 袪邪褋褋褍写懈褌械谢械薪, 芯褑械薪懈胁邪械褌 芯斜褋褌芯褟褌械谢褜褋褌胁邪 褋 褌芯褔泻懈 蟹褉械薪懈褟 谐芯褋褍写邪褉褋褌胁械薪薪芯泄 胁褘谐芯写褘.\n袩袨袥袠孝袠效袝小袣袠袝 袙袟袚袥携袛蝎: 小褌芯褉芯薪薪懈泻 锌褉懈屑邪褌邪 谐芯褋褍写邪褉褋褌胁邪 薪邪写 谢懈褔薪芯褋褌褜褞. 袩褉懈蟹薪邪褢褌 薪械芯斜褏芯写懈屑芯褋褌褜 褋懈谢褜薪芯泄 邪褉屑懈懈 懈 褌胁褢褉写芯泄 胁谢邪褋褌懈, 泻 胁芯泄薪械 芯褌薪芯褋懈褌褋褟 褋写械褉卸邪薪薪芯. 袠写械芯谢芯谐懈褔械褋泻懈 褋芯胁屑械褋褌懈屑 褋 谐芯褋褍写邪褉褋褌胁械薪薪懈褔械褋泻懈屑懈 褍褋褌邪薪芯胁泻邪屑懈.\n袩袨袙袝袛袝袧袠袝 袩袪袠 袛袨袩袪袨小袝: 袛械褉卸邪谢褋褟 褋芯斜褉邪薪薪芯, 芯褌胁械褔邪谢 锌芯 褋褍褖械褋褌胁褍. 袙褘泻邪蟹邪谢 锌芯薪懈屑邪薪懈械 懈薪褌械褉械褋芯胁 谐芯褋褍写邪褉褋褌胁邪 懈 谐芯褌芯胁薪芯褋褌褜 泻 褋芯褌褉褍写薪懈褔械褋褌胁褍.\n袩袨孝袝袧笑袠袗袥鞋袧袗携 笑袝袧袧袨小孝鞋 袛袥携 小小小袪: 袙蝎小袨袣袗携\n袩袨袥袠孝袠效袝小袣袗携 袘袥袗袚袨袧袗袛袝袞袧袨小孝鞋: 小袪袝袛袧携携\n搂R袟袗袣袥挟效袝袧袠袝:搂! 袩褉懈 薪邪写谢械卸邪褖械屑 薪邪锌褉邪胁谢械薪懈懈 锌褉懈谐芯写械薪 泻 懈褋锌芯谢褜蟹芯胁邪薪懈褞 胁 懈薪褌械褉械褋邪褏 谐芯褋褍写邪褉褋褌胁邪. 袪械泻芯屑械薪写褍械褌褋褟 泻 锌褉懈胁谢械褔械薪懈褞 褋 锌芯褋谢械写褍褞褖械泄 锌褉芯胁械褉泻芯泄.\n袧袗袪袣袨袦 袙袧校孝袪袝袧袧袠啸 袛袝袥 袚.袚. 携谐芯写邪"
 introduction_event.3.a: "孝邪泻懈械 谢褞写懈 薪褍卸薪褘 薪邪褍泻械!"

 introduction_event.4.t: "袛芯褋褜械 薪邪 谐褉. 袨泻械邪薪芯胁邪"
 introduction_event.4.d: "搂R小袨袙袝袪楔袝袧袧袨 小袝袣袪袝孝袧袨搂!\n袧袣袙袛 小小小袪\n\n袛袨小鞋袝 #15433\n\n肖袗袦袠袥袠携, 袠袦携, 袨孝效袝小孝袙袨: 袨泻械邪薪芯胁 袝胁谐械薪懈泄 -\n袛袗孝袗 袪袨袞袛袝袧袠携: 27.10.2003\n袦袝小孝袨 袪袨袞袛袝袧袠携: 谐. 袦芯褋泻胁邪\n袙袨袟袪袗小孝: 22 锌芯谢薪褘褏 谐芯写邪\n\n搂R袨小袨袘蝎袝 袧袗袙蝎袣袠 袠 袟袧袗袧袠携:搂! 袪邪褋锌芯谢邪谐邪械褌 胁芯械薪薪芯泄 锌芯写谐芯褌芯胁泻芯泄 懈 芯锌褘褌芯屑 泻芯屑邪薪写芯胁邪薪懈褟, 锌芯写写械褉卸懈胁邪械褌 褋胁褟蟹懈 褋 胁芯械薪薪褘屑懈 泻褉褍谐邪屑懈. 袙谢邪写械械褌 屑褍蟹褘泻邪谢褜薪褘屑 懈褋泻褍褋褋褌胁芯屑. 袨褌屑械褔械薪褘 芯褉谐邪薪懈蟹邪褌芯褉褋泻懈械 褋锌芯褋芯斜薪芯褋褌懈.\n\n搂R袨袩袠小袗袧袠袝 袥袠效袧袨小孝袠:搂!\n啸袗袪袗袣孝袝袪: 小写械褉卸邪薪, 薪械屑薪芯谐芯褋谢芯胁械薪, 胁 芯斜褋褍卸写械薪懈褟褏 褍褔邪褋褌胁褍械褌 褉械卸械 锌褉芯褔懈褏 胁胁懈写褍 蟹邪薪褟褌芯褋褌懈. 小锌芯褋芯斜械薪 泻 褉褍泻芯胁芯写褋褌胁褍 谐褉褍锌锌芯泄. 袚谢邪胁薪褘屑 写谢褟 褋械斜褟 褋褔懈褌邪械褌 褋邪屑芯褉邪蟹胁懈褌懈械.\n袩袨袥袠孝袠效袝小袣袠袝 袙袟袚袥携袛蝎: 袩褉懈写械褉卸懈胁邪械褌褋褟 泻芯薪褋械褉胁邪褌懈胁薪褘褏 胁蟹谐谢褟写芯胁, 锌芯褋谢械写芯胁邪褌械谢械薪 胁 锌褉懈胁械褉卸械薪薪芯褋褌懈 褋懈谢褜薪芯屑褍 谐芯褋褍写邪褉褋褌胁褍 懈 锌芯褉褟写泻褍, 斜械蟹芯锌邪褋薪芯褋褌褜 褋褌邪胁懈褌 胁褘褕械 谢懈褔薪褘褏 褋胁芯斜芯写. 袠褋锌芯胁械写褍械褌 锌褉邪胁芯褋谢邪胁懈械 懈 褔械褉锌邪械褌 胁写芯褏薪芯胁械薪懈械 胁 芦褉褍褋褋泻芯屑 薪邪褉芯写械禄, 褔褌芯 褍泻邪蟹褘胁邪械褌 薪邪 褉械谢懈谐懈芯蟹薪褘械 懈 薪邪褑懈芯薪邪谢褜薪芯-胁械谢懈泻芯写械褉卸邪胁薪褘械 薪邪褋褌褉芯械薪懈褟, 薪械褋芯胁屑械褋褌懈屑褘械 褋 谢懈薪懈械泄 锌邪褉褌懈懈. 小锌芯褋芯斜械薪 泻 锌芯泻邪蟹薪芯泄 褌械褉锌懈屑芯褋褌懈 泻 褔褍卸写褘屑 胁蟹谐谢褟写邪屑 锌褉懈 薪械芯斜褏芯写懈屑芯褋褌懈.\n袩袨袙袝袛袝袧袠袝 袩袪袠 袛袨袩袪袨小袝: 小锌芯泻芯械薪, 写懈褋褑懈锌谢懈薪懈褉芯胁邪薪, 芯褌胁械褔邪谢 褔褢褌泻芯, 锌褉懈蟹薪邪泻芯胁 褋褌褉邪褏邪 薪械 芯斜薪邪褉褍卸懈谢. 袙褉邪卸写械斜薪芯褋褌懈 泻 褋芯胁械褌褋泻芯泄 胁谢邪褋褌懈 薪械 胁褘泻邪蟹邪谢.\n袩袨孝袝袧笑袠袗袥鞋袧袗携 笑袝袧袧袨小孝鞋 袛袥携 小小小袪: 袙蝎小袨袣袗携\n袩袨袥袠孝袠效袝小袣袗携 袘袥袗袚袨袧袗袛袝袞袧袨小孝鞋: 小袪袝袛袧携携\n搂R袟袗袣袥挟效袝袧袠袝:搂! 袨褉谐邪薪懈蟹邪褌芯褉褋泻懈械 懈 胁芯械薪薪褘械 泻邪褔械褋褌胁邪 锌褉械写褋褌邪胁谢褟褞褌 蟹薪邪褔懈褌械谢褜薪褍褞 褑械薪薪芯褋褌褜. 袨写薪邪泻芯 褉械谢懈谐懈芯蟹薪芯褋褌褜 懈 胁械谢懈泻芯写械褉卸邪胁薪褘械 薪邪褋褌褉芯械薪懈褟 褌褉械斜褍褞褌 锌褉懈褋褌邪谢褜薪芯谐芯 胁薪懈屑邪薪懈褟; 锌褉械写邪薪薪芯褋褌褜 褋褍斜褗械泻褌邪 薪邪写谢械卸懈褌 褋胁芯械胁褉械屑械薪薪芯 薪邪锌褉邪胁懈褌褜 薪邪 薪邪写谢械卸邪褖懈泄 锌褉械写屑械褌.\n袧袗袪袣袨袦 袙袧校孝袪袝袧袧袠啸 袛袝袥 袚.袚. 携谐芯写邪"
 introduction_event.4.a: "效械褋褌褜 懈 锌芯褔械褌 懈褋褌懈薪薪芯屑褍 胁芯懈薪褍!"

 introduction_event.5.t: "袛芯褋褜械 薪邪 谐褉. 小. 袩邪胁谢芯胁邪"
 introduction_event.5.d: "搂R小袨袙袝袪楔袝袧袧袨 小袝袣袪袝孝袧袨搂!\n袧袣袙袛 小小小袪\n\n袛袨小鞋袝 #15434\n\n肖袗袦袠袥袠携, 袠袦携, 袨孝效袝小孝袙袨: 袩邪胁谢芯胁 小褌械锌邪薪 -\n袛袗孝袗 袪袨袞袛袝袧袠携: 26.08.2006\n袦袝小孝袨 袪袨袞袛袝袧袠携: 谐. 小邪褉邪薪褋泻\n袙袨袟袪袗小孝: 19 锌芯谢薪褘褏 谢械褌\n\n搂R袨小袨袘蝎袝 袧袗袙蝎袣袠 袠 袟袧袗袧袠携:搂! 袩芯 褉芯写褍 蟹邪薪褟褌懈泄 - 褍褔懈褌械谢褜. 袨褌谢懈褔邪械褌褋褟 褕懈褉芯泻芯泄 薪邪褔懈褌邪薪薪芯褋褌褜褞; 锌芯蟹薪邪薪懈褟 薪芯褋褟褌 芯褌胁谢械褔褢薪薪褘泄 褏邪褉邪泻褌械褉, 锌褉邪泻褌懈褔械褋泻芯谐芯 锌褉懈屑械薪械薪懈褟 锌芯褔褌懈 薪械 懈屑械褞褌. 袨褌屑械褔械薪 懈薪褌械褉械褋 泻 锌褉芯写褍泻褑懈懈 褟锌芯薪褋泻芯谐芯 褉懈褋芯胁邪薪薪芯谐芯 褋懈薪械屑邪褌芯谐褉邪褎邪 - 芯斜褋褌芯褟褌械谢褜褋褌胁芯, 胁胁懈写褍 薪邪屑械褉械薪懈泄 携锌芯薪褋泻芯泄 懈屑锌械褉懈懈, 锌芯写谢械卸邪褖械械 锌褉芯胁械褉泻械.\n\n搂R袨袩袠小袗袧袠袝 袥袠效袧袨小孝袠:搂!\n啸袗袪袗袣孝袝袪: 校褉邪胁薪芯胁械褕械薪, 褍褋褌褍锌褔懈胁, 泻芯薪褎谢懈泻褌芯胁 懈蟹斜械谐邪械褌.\n袩袨袥袠孝袠效袝小袣袠袝 袙袟袚袥携袛蝎: 袨锌褉械写械谢褢薪薪芯泄 锌芯蟹懈褑懈懈 薪械 蟹邪薪懈屑邪械褌, 锌芯谢懈褌懈泻褍 芯褌胁械褉谐邪械褌, 胁芯 胁褋褢屑 锌褉懈写械褉卸懈胁邪械褌褋褟 褋褉械写懈薪薪芯泄 谢懈薪懈懈. 袩芯褋谢械写芯胁邪褌械谢褜薪芯 胁褘褋褌褍锌邪械褌 锌褉芯褌懈胁 胁芯泄薪褘. 袨褌褋褍褌褋褌胁懈械 泻谢邪褋褋芯胁芯泄 锌芯蟹懈褑懈懈 褋邪屑芯 锌芯 褋械斜械 锌芯写谢械卸懈褌 胁薪懈屑邪薪懈褞.\n袩袨袙袝袛袝袧袠袝 袩袪袠 袛袨袩袪袨小袝: 袛械褉卸邪谢褋褟 褋屑懈褉薪芯, 褋谢械写芯胁邪褌械谢褞 薪械 锌褉芯褌懈胁芯褉械褔懈谢, 褑械薪薪褘褏 褋胁械写械薪懈泄 薪械 褋芯芯斜褖懈谢 蟹邪 薪械懈屑械薪懈械屑 褌邪泻芯胁褘褏.\n袩袨孝袝袧笑袠袗袥鞋袧袗携 笑袝袧袧袨小孝鞋 袛袥携 小小小袪: 袧袠袟袣袗携\n袩袨袥袠孝袠效袝小袣袗携 袘袥袗袚袨袧袗袛袝袞袧袨小孝鞋: 小袪袝袛袧携携\n搂R袟袗袣袥挟效袝袧袠袝:搂! 袩褉邪泻褌懈褔械褋泻邪褟 褑械薪薪芯褋褌褜 薪械蟹薪邪褔懈褌械谢褜薪邪, 褟胁薪邪褟 芯锌邪褋薪芯褋褌褜 薪械 褍褋褌邪薪芯胁谢械薪邪. 袨写薪芯褎邪屑懈谢械褑 蟹邪写械褉卸邪薪薪芯谐芯 袗. 袩邪胁谢芯胁邪; 褉芯写褋褌胁械薪薪邪褟 褋胁褟蟹褜 薪械 褍褋褌邪薪芯胁谢械薪邪. 袛芯锌褍褋褌懈屑芯 懈褋锌芯谢褜蟹芯胁邪薪懈械 薪邪 锌褉芯褋胁械褌懈褌械谢褜褋泻芯屑 薪邪锌褉邪胁谢械薪懈懈 锌芯写 薪邪写蟹芯褉芯屑.\n袧袗袪袣袨袦 袙袧校孝袪袝袧袧袠啸 袛袝袥 袚.袚. 携谐芯写邪"
 introduction_event.5.a: "校卸 薪械 蟹薪邪褞, 锌芯褔械屑褍, 薪芯 芯薪 屑薪械 薪褉邪胁懈褌褋褟."

 introduction_event.6.t: "袛芯褋褜械 薪邪 谐褉. 袛邪薪褔械薪泻芯"
 introduction_event.6.d: "搂R小袨袙袝袪楔袝袧袧袨 小袝袣袪袝孝袧袨搂!\n袧袣袙袛 小小小袪\n\n袛袨小鞋袝 #15435\n\n肖袗袦袠袥袠携, 袠袦携, 袨孝效袝小孝袙袨: 袛邪薪褔械薪泻芯 袠胁邪薪 -\n袛袗孝袗 袪袨袞袛袝袧袠携: 08.11.2009\n袦袝小孝袨 袪袨袞袛袝袧袠携: 谐. 袦懈薪褋泻, 袘小小袪\n袙袨袟袪袗小孝: 16 锌芯谢薪褘褏 谢械褌\n\n搂R袨小袨袘蝎袝 袧袗袙蝎袣袠 袠 袟袧袗袧袠携:搂! 袨斜褍褔邪械褌褋褟 薪邪 懈薪卸械薪械褉邪 胁芯蟹写褍褕薪芯谐芯 褎谢芯褌邪, 褋锌械褑懈邪谢懈蟹懈褉褍械褌褋褟 薪邪 邪胁懈邪褑懈懈. 袩芯蟹薪邪薪懈褟 胁 褍褋褌褉芯泄褋褌胁械 谢械褌邪褌械谢褜薪褘褏 邪锌锌邪褉邪褌芯胁 锌械褉褋锌械泻褌懈胁薪褘褏 芯斜褉邪蟹褑芯胁 锌褉械写褋褌邪胁谢褟褞褌 锌械褉胁芯褋褌械锌械薪薪褍褞 褑械薪薪芯褋褌褜 写谢褟 芯斜芯褉芯薪薪芯泄 锌褉芯屑褘褕谢械薪薪芯褋褌懈.\n\n搂R袨袩袠小袗袧袠袝 袥袠效袧袨小孝袠:搂!\n啸袗袪袗袣孝袝袪: 小邪薪谐胁懈薪懈泻, 邪泻褌懈胁械薪. 袩芯 褋泻谢邪写褍 斜谢懈蟹芯泻 泻 蟹邪写械褉卸邪薪薪芯屑褍 袩芯锌芯胁褍, 锌褉械写锌芯谢芯卸懈褌械谢褜薪芯 褋芯褋褌芯懈褌 褋 薪懈屑 胁 写褉褍卸械褋泻懈褏 芯褌薪芯褕械薪懈褟褏. 袚谢邪胁薪褘屑 写谢褟 褋械斜褟 褋褔懈褌邪械褌 薪邪褍泻褍 懈 懈褋褋谢械写芯胁邪薪懈褟.\n袩袨袥袠孝袠效袝小袣袠袝 袙袟袚袥携袛蝎: 袚芯褋褍写邪褉褋褌胁械薪薪懈泻, 褋褌芯褉芯薪薪懈泻 褋懈谢褜薪芯泄 写械褉卸邪胁褘; 胁屑械褋褌械 褋 褌械屑 胁褘褉邪卸械薪薪芯泄 锌芯谢懈褌懈褔械褋泻芯泄 锌芯蟹懈褑懈懈 薪械 蟹邪薪懈屑邪械褌, 锌褉懈写械褉卸懈胁邪械褌褋褟 褍屑械褉械薪薪褘褏 胁蟹谐谢褟写芯胁 懈 锌芯谐谢芯褖褢薪 薪邪褍褔薪芯-褌械褏薪懈褔械褋泻懈屑懈 懈薪褌械褉械褋邪屑懈. 袙写芯褏薪芯胁谢褟械褌褋褟 懈写械械泄 芯褋胁芯械薪懈褟 胁芯蟹写褍褕薪芯谐芯 懈 泻芯褋屑懈褔械褋泻芯谐芯 锌褉芯褋褌褉邪薪褋褌胁邪. 袣 胁芯泄薪械 芯褌薪芯褋懈褌褋褟 褋 芯褋褌芯褉芯卸薪芯褋褌褜褞. 校褉芯卸械薪械褑 袘械谢芯褉褍褋褋泻芯泄 小小袪.\n袩袨袙袝袛袝袧袠袝 袩袪袠 袛袨袩袪袨小袝: 袨褌胁械褔邪谢 褍胁械褉械薪薪芯, 锌芯写褉芯斜薪芯 懈蟹谢邪谐邪谢 褋胁械写械薪懈褟 芯 胁芯蟹写褍褕薪芯屑 褎谢芯褌械. 校谐褉芯蟹褘 薪械 锌褉械写褋褌邪胁谢褟械褌.\n袩袨孝袝袧笑袠袗袥鞋袧袗携 笑袝袧袧袨小孝鞋 袛袥携 小小小袪: 袙蝎小袨袣袗携\n袩袨袥袠孝袠效袝小袣袗携 袘袥袗袚袨袧袗袛袝袞袧袨小孝鞋: 袙蝎小袨袣袗携\n搂R袟袗袣袥挟效袝袧袠袝:搂! 袩芯蟹薪邪薪懈褟 胁 芯斜谢邪褋褌懈 邪胁懈邪褋褌褉芯械薪懈褟 写械谢邪褞褌 褋褍斜褗械泻褌邪 芯褋芯斜芯 褑械薪薪褘屑 写谢褟 袙芯械薪薪芯-袙芯蟹写褍褕薪褘褏 小懈谢. 袪械泻芯屑械薪写褍械褌褋褟 泻 锌褉懈胁谢械褔械薪懈褞 泻 泻芯薪褋褌褉褍泻褌芯褉褋泻懈屑 褉邪斜芯褌邪屑 胁 泻褉邪褌褔邪泄褕懈泄 褋褉芯泻.\n袧袗袪袣袨袦 袙袧校孝袪袝袧袧袠啸 袛袝袥 袚.袚. 携谐芯写邪"
 introduction_event.6.a: "袪邪蟹邪屑 屑褘 锌邪写薪褨屑械屑 薪邪褕褘 褋邪屑邪谢褢褌褘 褳 薪械斜邪!"

 introduction_event.7.t: "袛芯褋褜械 薪邪 谐褉. 袪褘褔泻芯胁邪"
 introduction_event.7.d: "搂R小袨袙袝袪楔袝袧袧袨 小袝袣袪袝孝袧袨搂!\n袧袣袙袛 小小小袪\n\n袛袨小鞋袝 #15436\n\n肖袗袦袠袥袠携, 袠袦携, 袨孝效袝小孝袙袨: 袪褘褔泻芯胁 袚谢械斜 -\n袛袗孝袗 袪袨袞袛袝袧袠携: 01.01.2007\n袦袝小孝袨 袪袨袞袛袝袧袠携: 谐. 小邪褉邪褌芯胁\n袙袨袟袪袗小孝: 19 锌芯谢薪褘褏 谢械褌\n\n搂R袨小袨袘蝎袝 袧袗袙蝎袣袠 袠 袟袧袗袧袠携:搂! 袨斜褍褔邪械褌褋褟 褋锌械褑懈邪谢褜薪芯褋褌懈 锌芯 胁褘褔懈褋谢懈褌械谢褜薪褘屑 屑邪褕懈薪邪屑, 褋胁械写褍褖 胁 芯褏褉邪薪械 褋械泻褉械褌薪褘褏 褋胁械写械薪懈泄. 袩褉械写褋褌邪胁谢褟械褌 褑械薪薪芯褋褌褜 泻邪泻 写谢褟 薪邪褍褔薪芯谐芯, 褌邪泻 懈 写谢褟 芯锌械褉邪褌懈胁薪芯谐芯 薪邪锌褉邪胁谢械薪懈褟.\n\n搂R袨袩袠小袗袧袠袝 袥袠效袧袨小孝袠:搂!\n啸袗袪袗袣孝袝袪: 肖谢械谐屑邪褌懈泻. 袧械胁芯蟹屑褍褌懈屑, 胁 褋锌芯褉邪褏 薪械 褍褔邪褋褌胁褍械褌, 褋芯褏褉邪薪褟械褌 褉芯胁薪芯械 锌芯胁械写械薪懈械 胁 谢褞斜褘褏 芯斜褋褌芯褟褌械谢褜褋褌胁邪褏. 袨褌屑械褔械薪褘 褋锌芯褋芯斜薪芯褋褌懈 泻 锌芯褋褉械写薪懈褔械褋褌胁褍 懈 褍谢邪卸懈胁邪薪懈褞 褉邪蟹薪芯谐谢邪褋懈泄.\n袩袨袥袠孝袠效袝小袣袠袝 袙袟袚袥携袛蝎: 袩芯 褋芯斜褋褌胁械薪薪芯屑褍 锌褉懈蟹薪邪薪懈褞, 褉邪薪械械 锌褉懈写械褉卸懈胁邪谢褋褟 谢懈斜械褉邪谢褜薪褘褏 胁蟹谐谢褟写芯胁, 胁锌芯褋谢械写褋褌胁懈懈 褋屑械薪懈谢 懈褏 薪邪 谐芯褋褍写邪褉褋褌胁械薪薪懈褔械褋泻懈械 懈 胁芯械薪薪褘械. 袪械蟹泻邪褟 锌械褉械屑械薪邪 褍斜械卸写械薪懈泄 锌芯写谢械卸懈褌 锌褉芯胁械褉泻械 薪邪 懈褋泻褉械薪薪芯褋褌褜.\n袩袨袙袝袛袝袧袠袝 袩袪袠 袛袨袩袪袨小袝: 袛械褉卸邪谢褋褟 褉芯胁薪芯, 芯褌胁械褔邪谢 芯斜写褍屑邪薪薪芯, 胁芯谢薪械薪懈褟 薪械 芯斜薪邪褉褍卸懈谢. 效褉械蟹屑械褉薪芯械 褋邪屑芯芯斜谢邪写邪薪懈械 芯褌屑械褔邪械褌褋褟 泻邪泻 芯斜褋褌芯褟褌械谢褜褋褌胁芯, 褌褉械斜褍褞褖械械 胁薪懈屑邪薪懈褟.\n袩袨孝袝袧笑袠袗袥鞋袧袗携 笑袝袧袧袨小孝鞋 袛袥携 小小小袪: 袙蝎小袨袣袗携\n袩袨袥袠孝袠效袝小袣袗携 袘袥袗袚袨袧袗袛袝袞袧袨小孝鞋: 小袪袝袛袧携携\n搂R袟袗袣袥挟效袝袧袠袝:搂! 笑械薪械薪 锌芯蟹薪邪薪懈褟屑懈 懈 褋锌芯褋芯斜薪芯褋褌褜褞 泻 锌芯褋褉械写薪懈褔械褋褌胁褍. 袠褋泻褉械薪薪芯褋褌褜 锌械褉械屑械薪褘 褍斜械卸写械薪懈泄 锌芯写谢械卸懈褌 锌褉芯胁械褉泻械 薪邪 写械谢械.\n袧袗袪袣袨袦 袙袧校孝袪袝袧袧袠啸 袛袝袥 袚.袚. 携谐芯写邪"
 introduction_event.7.a: "袠褋褌懈薪薪褘泄 锌邪褌褉懈芯褌"

 introduction_event.8.t: "袛芯褋褜械 薪邪 谐褉. 袠泻芯薪芯屑懈写懈"
 introduction_event.8.d: "搂R小袨袙袝袪楔袝袧袧袨 小袝袣袪袝孝袧袨搂!\n袧袣袙袛 小小小袪\n\n袛袨小鞋袝 #15437\n\n肖袗袦袠袥袠携, 袠袦携, 袨孝效袝小孝袙袨: 袠泻芯薪芯屑懈写懈 袛械屑芯泻褉懈褌 袙邪褋懈谢褜械胁懈褔\n袛袗孝袗 袪袨袞袛袝袧袠携: 14.12.2007\n袦袝小孝袨 袪袨袞袛袝袧袠携: 谐. 小胁械褉写谢芯胁褋泻 (锌褉芯懈褋褏芯卸写械薪懈械 谐褉械褔械褋泻芯械)\n袙袨袟袪袗小孝: 18 锌芯谢薪褘褏 谢械褌\n\n搂R袨小袨袘蝎袝 袧袗袙蝎袣袠 袠 袟袧袗袧袠携:搂! 袨褌屑械褔械薪邪 胁褘褉邪卸械薪薪邪褟 褋泻谢芯薪薪芯褋褌褜 泻 褌芯褉谐芯胁芯泄 懈 锌褉械写锌褉懈薪懈屑邪褌械谢褜褋泻芯泄 写械褟褌械谢褜薪芯褋褌懈 - 薪邪泻谢芯薪薪芯褋褌褜, 写谢褟 褋芯胁械褌褋泻芯谐芯 谐褉邪卸写邪薪懈薪邪 薪械写芯锌褍褋褌懈屑邪褟, 褏邪褉邪泻褌械褉薪邪褟 写谢褟 薪褝锌屑邪薪褋泻芯谐芯 褝谢械屑械薪褌邪. 袩芯 褋芯斜褋褌胁械薪薪褘屑 褋谢芯胁邪屑, 芯写懈薪 懈蟹 褍褔褉械写懈褌械谢械泄 谐褉褍锌锌褘.\n\n搂R袨袩袠小袗袧袠袝 袥袠效袧袨小孝袠:搂!\n啸袗袪袗袣孝袝袪: 袗泻褌懈胁械薪, 锌褉邪泻褌懈褔械薪, 褉邪蟹谐芯胁芯褉褔懈胁. 袚谢邪胁薪芯泄 褑械谢褜褞 薪邪蟹褘胁邪械褌 芦褋芯胁械褉褕械薪褋褌胁芯胁邪薪懈械 屑懈褉邪禄.\n袩袨袥袠孝袠效袝小袣袠袝 袙袟袚袥携袛蝎: 袟邪褟胁谢褟械褌 芯 锌褉懈胁械褉卸械薪薪芯褋褌懈 褋芯褑懈邪谢懈褋褌懈褔械褋泻懈屑 胁蟹谐谢褟写邪屑, 褔褌芯 薪械 褋芯谐谢邪褋褍械褌褋褟 褋 锌褉械写锌褉懈薪懈屑邪褌械谢褜褋泻懈屑懈 薪邪泻谢芯薪薪芯褋褌褟屑懈, 褋 懈褋锌芯胁械写褍械屑褘屑 锌褉邪胁芯褋谢邪胁懈械屑 懈 褋 胁褘褉邪卸械薪薪褘屑懈 锌邪褌褉懈芯褌懈褔械褋泻懈屑懈 褔褍胁褋褌胁邪屑懈 泻 袚褉械褑懈懈. 袙写芯褏薪芯胁谢褟械褌褋褟 懈写械褟屑懈 芯褋胁芯械薪懈褟 泻芯褋屑芯褋邪 懈 谐芯褉薪褘屑懈 谢邪薪写褕邪褎褌邪屑懈. 袩褉懈胁械褉卸械薪薪芯褋褌褜 懈薪芯褋褌褉邪薪薪芯屑褍 谐芯褋褍写邪褉褋褌胁褍 褍 懈薪芯褉芯写薪芯谐芯 锌芯 锌褉芯懈褋褏芯卸写械薪懈褞 褝谢械屑械薪褌邪 懈 褉械谢懈谐懈芯蟹薪芯褋褌褜 锌褉械写褋褌邪胁谢褟褞褌 褌褉械胁芯卸薪褘械 芯斜褋褌芯褟褌械谢褜褋褌胁邪.\n袩袨袙袝袛袝袧袠袝 袩袪袠 袛袨袩袪袨小袝: 袨褌胁械褔邪谢 锌芯写褉芯斜薪芯, 薪械芯写薪芯泻褉邪褌薪芯 褍锌芯屑懈薪邪谢 袚褉械褑懈褞, 胁 褋芯褑懈邪谢懈褋褌懈褔械褋泻懈褏 褍斜械卸写械薪懈褟褏 蟹邪胁械褉褟谢 薪邪褋褌芯泄褔懈胁芯, 褔褌芯 褋薪懈卸邪械褌 懈褏 褍斜械写懈褌械谢褜薪芯褋褌褜.\n袩袨孝袝袧笑袠袗袥鞋袧袗携 笑袝袧袧袨小孝鞋 袛袥携 小小小袪: 小袪袝袛袧携携\n袩袨袥袠孝袠效袝小袣袗携 袘袥袗袚袨袧袗袛袝袞袧袨小孝鞋: 袧袠袟袣袗携\n搂R袟袗袣袥挟效袝袧袠袝:搂! 小芯褔械褌邪薪懈械 褋芯褑懈邪谢懈褋褌懈褔械褋泻芯泄 褉懈褌芯褉懈泻懈 褋 褔邪褋褌薪芯锌褉械写锌褉懈薪懈屑邪褌械谢褜褋泻懈屑懈 薪邪泻谢芯薪薪芯褋褌褟屑懈, 褉械谢懈谐懈芯蟹薪芯褋褌褜褞 懈 懈薪芯褉芯写褔械褋泻懈屑 锌邪褌褉懈芯褌懈蟹屑芯屑 褏邪褉邪泻褌械褉懈蟹褍械褌 褋褍斜褗械泻褌邪 泻邪泻 锌褉芯褌懈胁芯褉械褔懈胁芯谐芯 懈 薪械斜谢邪谐芯薪邪写褢卸薪芯谐芯. 袩芯写谢懈薪薪芯褋褌褜 懈屑械薪懈 懈 褎邪屑懈谢懈懈 锌芯写谢械卸懈褌 锌褉芯胁械褉泻械.\n袧袗袪袣袨袦 袙袧校孝袪袝袧袧袠啸 袛袝袥 袚.袚. 携谐芯写邪"
 introduction_event.8.a: "袠薪褌械褉械褋薪芯, 械谐芯 锌褉邪胁写邪 褌邪泻 蟹芯胁褍褌? 袧褍卸薪芯 褍褌芯褔薪懈褌褜 褍 褋褌械薪芯谐褉邪褎懈褋褌邪"

 introduction_event.9.t: "袛芯褋褜械 薪邪 谐褉. 袗. 袩邪胁谢芯胁邪"
 introduction_event.9.d: "搂R小袨袙袝袪楔袝袧袧袨 小袝袣袪袝孝袧袨搂!\n袧袣袙袛 小小小袪\n\n袛袨小鞋袝 #15438\n\n肖袗袦袠袥袠携, 袠袦携, 袨孝效袝小孝袙袨: 袩邪胁谢芯胁 袗褉褋械薪懈泄 -\n袛袗孝袗 袪袨袞袛袝袧袠携: 21.02.2007\n袦袝小孝袨 袪袨袞袛袝袧袠携: 谐. 袣邪谢懈薪懈薪\n袙袨袟袪袗小孝: 18 锌芯谢薪褘褏 谢械褌\n\n搂R袨小袨袘蝎袝 袧袗袙蝎袣袠 袠 袟袧袗袧袠携:搂! 小胁械写械薪懈褟 芯 褉芯写械 蟹邪薪褟褌懈泄 薪械锌芯谢薪褘. 袚褍屑邪薪懈褌邪褉薪芯谐芯 褋泻谢邪写邪, 斜械蟹 胁褘褉邪卸械薪薪褘褏 锌褉邪泻褌懈褔械褋泻懈褏 薪邪胁褘泻芯胁; 锌褉械胁褘褕械 胁褋械谐芯 褋褌邪胁懈褌 懈褋泻褍褋褋褌胁芯 懈 泻褉邪褋芯褌褍 褔械谢芯胁械泻邪.\n\n搂R袨袩袠小袗袧袠袝 袥袠效袧袨小孝袠:搂!\n啸袗袪袗袣孝袝袪: 小写械褉卸邪薪, 褍褋褌褍锌褔懈胁, 写芯斜褉芯卸械谢邪褌械谢械薪. 袩芯 屑邪薪械褉械 锌芯胁械写械薪懈褟 褋褏芯卸 褋 蟹邪写械褉卸邪薪薪褘屑 小. 袩邪胁谢芯胁褘屑 (芯写薪芯褎邪屑懈谢械褑, 褉芯写褋褌胁械薪薪邪褟 褋胁褟蟹褜 薪械 褍褋褌邪薪芯胁谢械薪邪).\n袩袨袥袠孝袠效袝小袣袠袝 袙袟袚袥携袛蝎: 袩褍斜谢懈褔薪芯 蟹邪薪懈屑邪械褌 斜械蟹褉邪蟹谢懈褔薪褍褞 泻 锌芯谢懈褌懈泻械 锌芯蟹懈褑懈褞. 袙屑械褋褌械 褋 褌械屑 锌芯 褋芯斜褉邪薪薪褘屑 褋胁械写械薪懈褟屑 锌褉懈写械褉卸懈胁邪械褌褋褟 斜褍褉卸褍邪蟹薪芯-谢懈斜械褉邪谢褜薪褘褏 懈 褋胁械褌褋泻芯-谐褍屑邪薪懈褋褌懈褔械褋泻懈褏 胁蟹谐谢褟写芯胁, 褋褏芯写薪褘褏 褋 褍褋褌邪薪芯胁泻邪屑懈 谐褉. 携泻褍褕懈薪邪. 袛芯褋褌芯胁械褉薪芯 褍褋褌邪薪芯胁懈褌褜 褋褌械锌械薪褜 懈褏 褋芯胁锌邪写械薪懈褟 锌褉械卸写械胁褉械屑械薪薪芯.\n袩袨袙袝袛袝袧袠袝 袩袪袠 袛袨袩袪袨小袝: 袛械褉卸邪谢褋褟 褋屑懈褉薪芯, 胁芯 胁褋褢屑 褋芯谐谢邪褕邪谢褋褟, 胁 锌褉械写芯褋褍写懈褌械谢褜薪芯屑 薪械 褍谢懈褔褢薪. 袩褉芯懈蟹胁芯写懈褌 胁锌械褔邪褌谢械薪懈械 斜械蟹芯斜懈写薪芯械; 褋褌械锌械薪褜 斜械蟹芯斜懈写薪芯褋褌懈 胁褘蟹褘胁邪械褌 褋芯屑薪械薪懈褟.\n袩袨孝袝袧笑袠袗袥鞋袧袗携 笑袝袧袧袨小孝鞋 袛袥携 小小小袪: 袧袠袟袣袗携\n袩袨袥袠孝袠效袝小袣袗携 袘袥袗袚袨袧袗袛袝袞袧袨小孝鞋: 小袪袝袛袧携携\n搂R袟袗袣袥挟效袝袧袠袝:搂! 袩芯 胁薪械褕薪懈屑 锌褉懈蟹薪邪泻邪屑 斜谢邪谐芯薪邪写褢卸械薪, 芯写薪邪泻芯 褉邪褋褏芯卸写械薪懈械 屑械卸写褍 锌褍斜谢懈褔薪芯泄 芯褌褋褌褉邪薪褢薪薪芯褋褌褜褞 懈 褋芯斜褉邪薪薪褘屑懈 褋胁械写械薪懈褟屑懈 芯 械谐芯 胁蟹谐谢褟写邪褏 褌褉械斜褍械褌 胁薪懈屑邪薪懈褟: 薪械 褋泻褉褘胁邪械褌 谢懈 褋褍斜褗械泻褌 褍斜械卸写械薪懈褟, 褋褏芯写薪褘械 褋 写械褟褌械谢褟屑懈 <袛袗袧袧蝎袝 校袛袗袥袝袧蝎>. 袧邪斜谢褞写械薪懈械 锌褉芯写芯谢卸懈褌褜.\n袧袗袪袣袨袦 袙袧校孝袪袝袧袧袠啸 袛袝袥 袚.袚. 携谐芯写邪"
 introduction_event.9.a: "袣芯谐芯-褌芯 芯薪 屑薪械 薪邪锌芯屑懈薪邪械褌..."

#袠胁械薪褌褘 褉械褕械薪懈泄
 campaign_event.1.t: "袗褉屑懈褟 褋锌褉邪胁谢褟械褌褋褟 褋 蟹邪写邪褔械泄"
 campaign_event.1.d: "袟邪写械泄褋褌胁芯胁邪薪薪褘械 胁芯泄褋泻邪 褍褋锌械褕薪芯 胁褘锌芯谢薪懈谢懈 锌芯褋褌邪胁谢械薪薪褍褞 蟹邪写邪褔褍. 袙褋械 谢懈褑邪, 锌褉懈褔邪褋褌薪褘械 泻 袠薪褑懈写械薪褌褍 '袘', 斜褘谢懈 薪邪泄写械薪褘 懈 懈蟹芯谢懈褉芯胁邪薪褘. 袨写薪邪泻芯 薪械 芯斜芯褕谢芯褋褜 斜械蟹 邪褉械褋褌芯胁 薪械锌褉懈褔邪褋褌薪褘褏 懈 锌芯谐褉芯屑芯胁, 褔褌芯 胁褘蟹胁邪谢芯 薪械泻芯褌芯褉芯械 薪械写芯胁芯谢褜褋褌胁芯 褋褉械写懈 薪邪褋械谢械薪懈褟. 孝械屑 薪械 屑械薪械械, 懈薪褎芯褉屑邪褑懈褟 芯 锌褉芯懈褋褕械褋褌胁懈懈 斜褘谢邪 褝褎褎械泻褌懈胁薪芯 褋芯泻褉褘褌邪 (胁屑械褋褌械 褋 薪芯褋懈褌械谢褟屑懈), 懈 写邪谢褜薪械泄褕械械 褉邪褋锌褉芯褋褌褉邪薪械薪懈械 褋胁械写械薪懈泄 褍写邪谢芯褋褜 锌褉械写芯褌胁褉邪褌懈褌褜."
 campaign_event.1.a: "袗褉屑懈褟 胁褘锌芯谢薪懈谢邪 褋胁芯褞 蟹邪写邪褔褍, 薪褉邪胁懈褌褋褟 胁邪屑 褝褌芯 懈谢懈 薪械褌."

 campaign_event.2.t: "袧袣袙袛 斜械褉械褌 褋懈褌褍邪褑懈褞 锌芯写 泻芯薪褌褉芯谢褜"
 campaign_event.2.d: "袛芯锌芯谢薪懈褌械谢褜薪褘械 褉械褋褍褉褋褘, 胁褘写械谢械薪薪褘械 薪邪 褍褋褌褉邪薪械薪懈械 锌芯褋谢械写褋褌胁懈泄 懈薪褑懈写械薪褌邪, 薪邪泻芯薪械褑 写邪谢懈 褋胁芯懈 锌谢芯写褘. 袧袣袙袛 褍褋锌械褕薪芯 胁蟹褟谢 褋懈褌褍邪褑懈褞 锌芯写 泻芯薪褌褉芯谢褜. 袙褋械 谢懈褑邪, 锌褉懈褔邪褋褌薪褘械 泻 袠薪褑懈写械薪褌褍 '袘', 斜褘谢懈 薪邪泄写械薪褘 懈 邪褉械褋褌芯胁邪薪褘. 袘谢邪谐芯写邪褉褟 褉械褕懈褌械谢褜薪褘屑 写械泄褋褌胁懈褟屑 袧袣袙袛 写邪谢褜薪械泄褕械械 褉邪褋锌褉芯褋褌褉邪薪械薪懈械 懈薪褎芯褉屑邪褑懈懈 斜褘谢芯 褝褎褎械泻褌懈胁薪芯 锌褉械写芯褌胁褉邪褖械薪芯, 懈 褋懈褌褍邪褑懈褟 褋褌邪斜懈谢懈蟹懈褉芯胁邪谢邪褋褜."
 campaign_event.2.a: "袧袣袙袛 - 泻邪褉邪褞褖懈泄 屑械褔 写懈泻褌邪褌褍褉褘 褉邪斜芯褔械谐芯 泻谢邪褋褋邪."

 campaign_event.3.t: "袩褉芯锌邪谐邪薪写邪 褋褉邪斜芯褌邪谢邪"
 campaign_event.3.d: "袧邪褕懈 锌褉芯锌邪谐邪薪写懈褋褌褋泻懈械 褍褋懈谢懈褟 褍胁械薪褔邪谢懈褋褜 褍褋锌械褏芯屑. 袚芯褋褍写邪褉褋褌胁械薪薪褘械 小袦袠 褝褎褎械泻褌懈胁薪芯 写懈褋泻褉械写懈褌懈褉芯胁邪谢懈 褋胁懈写械褌械谢械泄 懈 锌褉械写褋褌邪胁懈谢懈 邪谢褜褌械褉薪邪褌懈胁薪褍褞 胁械褉褋懈褞 褋芯斜褘褌懈泄, 褔褌芯 锌芯屑芯谐谢芯 褍褋锌芯泻芯懈褌褜 芯斜褖械褋褌胁械薪薪芯褋褌褜 懈 锌褉械写芯褌胁褉邪褌懈褌褜 褉邪褋锌褉芯褋褌褉邪薪械薪懈械 褋谢褍褏芯胁. 啸芯褌褟 薪械泻芯褌芯褉褘械 谢褞写懈 胁褋械 械褖械 褋芯屑薪械胁邪褞褌褋褟, 斜芯谢褜褕懈薪褋褌胁芯 锌褉懈薪褟谢懈 芯褎懈褑懈邪谢褜薪褍褞 胁械褉褋懈褞 褋芯斜褘褌懈泄."
 campaign_event.3.a: "袩械褔邪褌褜 - 褋邪屑芯械 褋懈谢褜薪芯械 芯褉褍卸懈械!"

 campaign_event.4.t: "袙芯谢薪械薪懈褟 褍屑械薪褜褕邪褞褌褋褟"
 campaign_event.4.d: "袩芯褏芯卸械, 褋褌褉邪褌械谐懈褟 薪械胁屑械褕邪褌械谢褜褋褌胁邪 薪械 斜褘谢邪 芯褕懈斜芯褔薪芯泄. 小 褌械褔械薪懈械屑 胁褉械屑械薪懈 芯斜褖械褋褌胁械薪薪芯械 胁薪懈屑邪薪懈械 泻 懈薪褑懈写械薪褌褍 薪邪褔懈薪邪械褌 芯褋谢邪斜械胁邪褌褜, 懈 屑芯卸薪芯 薪邪蟹胁邪褌褜 泻邪屑锌邪薪懈褞 锌芯 蟹邪屑邪谢褔懈胁邪薪懈褞 褍褋锌械褕薪芯泄. 啸芯褌褟 薪械泻芯褌芯褉褘械 谢褞写懈 胁褋械 械褖械 芯斜褋褍卸写邪褞褌 锌褉芯懈蟹芯褕械写褕械械, 斜芯谢褜褕懈薪褋褌胁芯 褍卸械 薪械 锌褉芯褟胁谢褟褞褌 泻 褝褌芯屑褍 懈薪褌械褉械褋邪."
 campaign_event.4.a: "袠薪芯谐写邪 谢褍褔褕械 胁褋械谐芯 锌褉芯褋褌芯 薪械 胁屑械褕懈胁邪褌褜褋褟"

 campaign_event.5.t: "袠薪褑懈写械薪褌 锌芯谢薪芯褋褌褜褞 锌褉芯锌邪谢 褋 锌芯胁械褋褌泻懈 写薪褟"
 campaign_event.5.d: "协褌芯 斜褘谢芯 薪邪懈谢褍褔褕械械 褉械褕械薪懈械 懈蟹 胁芯蟹屑芯卸薪褘褏. 袥褞写懈, 锌褉懈胁褘泻褕懈械 薪械 写芯胁械褉褟褌褜 锌褉芯锌邪谐邪薪写械, 斜褘褋褌褉芯 锌芯褌械褉褟谢懈 懈薪褌械褉械褋 泻 懈薪褑懈写械薪褌褍 斜谢邪谐芯写邪褉褟 芯褌褋褍褌褋褌胁懈褞 胁薪懈屑邪薪懈褟 褋芯 褋褌芯褉芯薪褘 谐芯褋褍写邪褉褋褌胁邪. 袙 褉械蟹褍谢褜褌邪褌械 懈薪褑懈写械薪褌 '袘' 锌芯谢薪芯褋褌褜褞 懈褋褔械蟹 懈蟹 芯斜褖械褋褌胁械薪薪芯谐芯 褋芯蟹薪邪薪懈褟, 懈 写邪谢褜薪械泄褕械械 褉邪褋锌褉芯褋褌褉邪薪械薪懈械 懈薪褎芯褉屑邪褑懈懈 斜褘谢芯 褍褋锌械褕薪芯 锌褉械写芯褌胁褉邪褖械薪芯."
 campaign_event.5.a: "小谢芯胁芯 - 褋械褉械斜褉芯, 屑芯谢褔邪薪懈械 - 蟹芯谢芯褌芯"

 campaign_event.6.t: "袙芯谢薪械薪懈褟 薪邪褉邪褋褌邪褞褌"
 campaign_event.6.d: "袩邪褋褋懈胁薪芯褋褌褜 懈 薪械褉械褕懈褌械谢褜薪芯褋褌褜 锌邪褉褌懈懈 芯斜械褉薪褍谢懈褋褜 泻邪褌邪褋褌褉芯褎芯泄. 小谢褍褏懈 懈 薪械写芯胁芯谢褜褋褌胁芯 褉邪褋锌褉芯褋褌褉邪薪褟褞褌褋褟, 懈 褋懈褌褍邪褑懈褟 胁褘褏芯写懈褌 懈蟹-锌芯写 泻芯薪褌褉芯谢褟. 袥褞写懈 薪邪褔懈薪邪褞褌 芯褌泻褉褘褌芯 胁褘褉邪卸邪褌褜 褋胁芯械 薪械写芯胁芯谢褜褋褌胁芯 懈 褌褉械斜芯胁邪褌褜 褉邪褋泻褉褘褌懈褟 锌褉邪胁写褘, 邪 锌褉邪胁懈褌械谢褜褋褌胁芯 褋褌邪谢泻懈胁邪械褌褋褟 褋 褉邪褋褌褍褖懈屑懈 褌褉褍写薪芯褋褌褟屑懈 胁 锌芯锌褘褌泻邪褏 褋芯褏褉邪薪懈褌褜 锌芯褉褟写芯泻. 袠薪褑懈写械薪褌 '袘' 褋褌邪薪芯胁懈褌褋褟 褑械薪褌褉邪谢褜薪芯泄 褌械屑芯泄 芯斜褖械褋褌胁械薪薪芯谐芯 芯斜褋褍卸写械薪懈褟, 懈 写邪谢褜薪械泄褕械械 褉邪褋锌褉芯褋褌褉邪薪械薪懈械 懈薪褎芯褉屑邪褑懈懈 褋褌邪薪芯胁懈褌褋褟 薪械懈蟹斜械卸薪褘屑."
 campaign_event.6.a: "袣芯谐芯-褌芯 褋褌芯懈褌 蟹邪 褝褌芯 褉邪褋褋褌褉械谢褟褌褜"

