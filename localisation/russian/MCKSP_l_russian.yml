# Тултипы идеологий
# £GFX_...£ вставляет иконку-символ в строку.
 MCKSP_PT_NIKITA:0 "£GFX_MCKSP_ideo_sym_nikita£ §YСоциал-либерализм§!\n------------------------\nНикита Якушин\n\nДоктрина прогрессивной демократии. Социальное государство, гражданские свободы, регулируемый рынок, активная роль государства в обеспечении равенства возможностей.\n\nЭкономическая ось: §Y-2§! (лево)\nСоциальная ось: §Y-5§! (либертарность)"
 MCKSP_PT_ARSENY:0 "£GFX_MCKSP_ideo_sym_arseny£ §YЛиберальный гуманизм§!\n------------------------\nАрсений Павлов\n\nГуманистический либерализм с акцентом на правах человека, многообразии и толерантности. Минимальное вмешательство государства в личные дела, защита уязвимых групп.\n\nЭкономическая ось: §Y-1§! (лево)\nСоциальная ось: §Y-4§! (либертарность)"
 MCKSP_PT_DEMOKRIT:0 "£GFX_MCKSP_ideo_sym_demokrit£ §YРыночный социализм§!\n------------------------\nДемокрит Икономиди\n\nСоциализм с рыночными механизмами. Общественная собственность на ключевые отрасли, рыночное распределение в потребительском секторе, рабочее самоуправление.\n\nЭкономическая ось: §Y-5§! (лево)\nСоциальная ось: §Y+1§! (авторитарность)"
 MCKSP_PT_GLEB:0 "£GFX_MCKSP_ideo_sym_gleb£ §YПрагматичный синкретизм§!\n------------------------\nГлеб Рычков\n\nСинтез разных идеологических традиций. Прагматичный подход к управлению, отказ от догматизма, выбор лучшего из противоположных систем по обстоятельствам.\n\nЭкономическая ось: §Y+1§! (право)\nСоциальная ось: §Y+1§! (авторитарность)"
 MCKSP_PT_STEPAN:0 "£GFX_MCKSP_ideo_sym_stepan£ §YХристианская демократия§!\n------------------------\nСтепан Павлов\n\nСоюз христианских ценностей с социальной демократией. Семья, традиция, солидарность, социальная справедливость через коллективную ответственность.\n\nЭкономическая ось: §Y+2§! (право)\nСоциальная ось: §Y+2§! (авторитарность)"
 MCKSP_PT_IVAN:0 "£GFX_MCKSP_ideo_sym_ivan£ §YТехнократический прогрессивизм§!\n------------------------\nИван Данченко\n\nИдеология научно-технического прогресса. Эффективное управление на основе данных, инвестиции в науку и образование, рациональное планирование.\n\nЭкономическая ось: §Y+1§! (право)\nСоциальная ось: §Y+4§! (авторитарность)"
 MCKSP_PT_ILYA:0 "£GFX_MCKSP_ideo_sym_ilya£ §YГосударственная технократия§!\n------------------------\nИлья Попов\n\nСильное государство, управляемое технократической элитой. Меритократия, плановая экономика, централизованное принятие решений на научной основе.\n\nЭкономическая ось: §Y+2§! (право)\nСоциальная ось: §Y+6§! (авторитарность)"
 MCKSP_PT_EVGENY:0 "£GFX_MCKSP_ideo_sym_evgeny£ §YНационал-консерватизм§!\n------------------------\nЕвгений Океанов\n\nЗащита национальной идентичности, традиций и суверенитета. Сильное государство, традиционные ценности, экономический патриотизм.\n\nЭкономическая ось: §Y+4§! (право)\nСоциальная ось: §Y+8§! (авторитарность)"
 MCKSP_PT_ARTEM:0 "£GFX_MCKSP_ideo_sym_artem£ §YДемократический социализм§!\n------------------------\nАртём Аюшеев\n\nСоциализм с человеческим лицом. Перестройка и гласность, частичный переход на рыночные рельсы при сохранении общественной собственности на ключевые отрасли. Курс реформ по образцу Горбачёва и Дэн Сяопина.\n\nЭкономическая ось: §Y-4§! (лево)\nСоциальная ось: §Y-2§! (либертарность)"
 MCKSP_PT_ILGAM:0 "£GFX_MCKSP_ideo_sym_ilgam£ §YПартия Фагаманова§!\n------------------------\nИльгам Фагаманов\n\nPLACEHOLDER. Идеология партии Ильгама Фагаманова — пока без определённой концепции.\n\nЭкономическая ось: §Y-3§! (лево)\nСоциальная ось: §Y+5§! (авторитарность)"

