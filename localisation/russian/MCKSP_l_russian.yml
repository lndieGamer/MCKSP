l_russian:
# MCKSP Mod - Russian localisation file

# Ideas localisation
 something_maybe_happened_idea:0 "Похоже, что-то происходит.."
 something_maybe_happened_idea_desc:0 "По ВКП(б) ходят слухи о таинственном докладе Ягоды Сталину. Никто не знает подробностей, но ясно одно — что-то происходит. Люди начинают волноваться, и правительство должно разобраться в ситуации."

 something_happened_idea:0 "Что-то произошло."
 something_happened_idea_desc:0 "Все больше людей начинают говорить о странных событиях, которые происходят в столице. Доклад высочайшего уровня секретности и данные из милицейского отчета об аресте странных людей - как быстро кто-то сможет сложить 2 и 2?"

 something_definetely_happened_idea:0 "Что-то ОПРЕДЕЛЕННО происходит"
 something_definetely_happened_idea_desc:0 "Слухи о происходящем распространяются по Москве все быстрее. Люди начинают паниковать, и правительство должно действовать быстро, чтобы предотвратить возможный кризис."

 guests_from_future_idea:0 "Гости из будущего"
 guests_from_future_idea_desc:0 "Ходят слухи, что в страну прибыла группа незнакомцев из будущего. Несмотря на усилия НКВД, среди населения начинает расти паника. Однако научно-исследовательские институты совместно проводят исследования, основанные на том, что удалось узнать у них, чтобы использовать технологии будущего на благо страны."

# Events localisation

# Сюжетные ивенты - начало
 start_event.1.t: "Странный доклад"
 start_event.1.d: "Тяжелые шаги эхом отдаются в коридорах Сенатского дворца. Генрих Ягода, нарком внутренних дел, спешно поднимается по лестнице, неся в руках папку с красной печатью «СОВЕРШЕННО СЕКРЕТНО». Его обычно невозмутимое лицо выдает едва заметное беспокойство, когда он подходит к кабинету Иосифа Сталина. Он стучит в дверь кабинета. Знакомый голос разрешает войти.\n— Товарищ Сталин, — Ягода кладет папку на массивный дубовый стол.\n— Вынужден доложить о весьма... необычном происшествии. Я прошу прощения за столь поздний визит, но ситуация требует вашего внимания.\nИосиф Виссарионович не поднимает глаз от документов, лишь указывает на стул напротив. Ягода садится, открывает папку дрожащими от напряжения пальцами.\n— Вчера вечером в Сокольниках наши люди обнаружили предмет, происхождение которого... — он делает паузу, — установить не удается.\nВождь наконец отрывается от бумаг, его проницательные глаза устремляются на Ягоду.\n— И вы считаете, что это требует моего внимания, товарищ Ягода? Почему вы решили, что делу о.. пропаже нужно присвоить — он кивнул на папку — такой высокий уровень секретности?\nЕго собеседник будто сжался под стальным взглядом.\n— Дело в его необъяснимой природе. Профессора Всесоюзного электротехнического института, которым мы отдали предмет на экспертизу, уже несколько дней не могут сказать нам ничего определенного. Они вскрыли устройство и попытались определить его природу. Единственное, что они смогли установить — так это то, что оно использует радиоволны для передачи данных. Но это едва ли одна десятая от того, что мы должны знать! Но они просто разводят руками!\nСталин спокойно наблюдал за панической речью своего подчиненного.\n— Я услышал ваш доклад, товарищ Ягода. Несомненно, это внушает определенное беспокойство, и я жду вашего дальнейшего расследования. Вы свободны.\nНарком встал и спешно покинул кабинет, чувствуя на себе тяжелый взгляд. Папка с докладом осталась лежать на столе."
 start_event.1.a: "Что-то происходит.."

 start_event.2.t: "Неожиданный свидетель"
 start_event.2.d: "В этот совершенно обычный денбь к участковому поступил странный звонок. Человек на другом конце провода утверждал, что он был свидетелем странного происшествия в Сокольниках, которое произошло в ту же ночь. Он описал, как видел группу незнакомцев, странно одетых и разговаривавших о странных вещах. Он утверждал, что эти люди были ошарашены и дизорганизованы, но не смог предоставить никаких подробностей о том, кто они были или откуда они пришли. Этот звонок вызвал новый виток слухов и спекуляций о том, что же произошло в Сокольниках."
 start_event.2.a: "Что-то происходит."

 start_event.3.t: "Арест незнакомцев"
 start_event.3.d: "В результате расследования, вызванного странным происшествием в Сокольниках, были арестованы несколько незнакомцев. Они были доставлены в НКВД для допроса. Ягода лично контролирует процесс, надеясь выяснить, кто эти люди и откуда они пришли.Сталин тем временем продолжал наблюдать за развитием событий, не вмешиваясь напрямую, но внимательно следя за каждым шагом Ягоды. Допрос незнакомцев обещает раскрыть новые детали о том, что произошло в Сокольниках, и может пролить свет на загадочные обстоятельства, окружающие это происшествие."
 start_event.3.a: "Что-то ОПРЕДЕЛЕННО происходит."

 interrogation_event.1.t: "Допрос незнакомцев"
 interrogation_event.1.d: "Сценка"
 interrogation_event.1.a: "Эти люди - угроза. Их нужно устранить."
 interrogation_event.1.b: "Эти люди - невероятная возможность для нас. Мы должны использовать их знания!"

#Знакомство с участниками
 introduction_event.1.t: "Будни в закрытом НИИ #14"
 introduction_event.1.d: "После допроса и направления всех задержанных в закрытый НИИ всех их распределили по группам в зависимости от их предполагаемой ценности и благонадёжности. Теперь им предстоит провести некоторое время в изоляции, ожидая дальнейших распоряжений. В это время сотрудники НКВД будут внимательно наблюдать за ними, собирая информацию и оценивая их потенциал для использования в интересах государства."
 introduction_event.1.a: "Время прочитать их досье"
 introduction_event.1.b: "К черту документы, пора пить чай."

 introduction_event.2.t: "Досье на гр. Якушина"
 introduction_event.2.d: "§RСОВЕРШЕННО СЕКРЕТНО§!\nНКВД СССР\n\nДОСЬЕ №15431\n\nФАМИЛИЯ, ИМЯ, ОТЧЕСТВО: Якушин Никита Сергеевич\nДАТА РОЖДЕНИЯ: 10.12.2004\nМЕСТО РОЖДЕНИЯ: г. Москва\nВОЗРАСТ: 21 полный год\n\n§RОСОБЫЕ НАВЫКИ И ЗНАНИЯ:§! Специалист по электронно-вычислительным устройствам неустановленного образца. Располагает обширными познаниями в области счётно-логических машин, природа и назначение которых современной науке неизвестны. Ценность сведений в полной мере не определена ввиду их опережающего характера.\n\n§RОПИСАНИЕ ЛИЧНОСТИ:§!\nХАРАКТЕР: Меланхолического склада, замкнут, склонен к отвлечённым рассуждениям. При этом в среде задержанных проявляет наибольшую речевую активность — противоречие, подлежащее наблюдению. Ссылается на неустановленную систему определения типа личности.\nПОЛИТИЧЕСКИЕ ВЗГЛЯДЫ: Придерживается взглядов, определяемых им как «социал-либеральные»: сочетание буржуазно-демократических установок с уравнительными. Исповедует светский гуманизм. Превыше прочего ставит личную карьеру и материальный достаток, что указывает на мещанские, стяжательские наклонности. Заявляет о безусловном отказе от войны в любой форме, включая оборону государства. Пораженческие настроения в условиях капиталистического окружения граничат с контрреволюционными.\nПОВЕДЕНИЕ ПРИ ДОПРОСЕ: Спокоен, признаков страха не обнаруживает. Вступает в пререкания со следователем, оспаривает основы советского строя. Запирательства и раскаяния не отмечено.\nПОТЕНЦИАЛЬНАЯ ЦЕННОСТЬ ДЛЯ СССР: ВЫСОКАЯ\nПОЛИТИЧЕСКАЯ БЛАГОНАДЕЖНОСТЬ: КРАЙНЕ НИЗКАЯ\n§RЗАКЛЮЧЕНИЕ:§! Высокая научная ценность при выраженной идеологической враждебности. Использование допустимо только в условиях изоляции и постоянного надзора, самостоятельная деятельность исключена. В быту отмечены черты, несовместимые с обликом советского гражданина. От широкого общения оградить.\nНАРКОМ ВНУТРЕННИХ ДЕЛ Г.Г. Ягода"
 introduction_event.2.a: "Да уж, необычный гражданин..."

 introduction_event.3.t: "Досье на гр. Попова"
 introduction_event.3.d: "§RСОВЕРШЕННО СЕКРЕТНО§!\nНКВД СССР\n\nДОСЬЕ №15432\n\nФАМИЛИЯ, ИМЯ, ОТЧЕСТВО: Попов Илья —\nДАТА РОЖДЕНИЯ: 07.12.2006\nМЕСТО РОЖДЕНИЯ: г. Майкоп\nВОЗРАСТ: 18 полных лет\n\n§RОСОБЫЕ НАВЫКИ И ЗНАНИЯ:§! Специалист по охране секретных сведений и противодействию их хищению. Сведущ в шифровальном деле и защите данных государственной важности. Область знаний представляет прямой интерес для органов. Практическая ценность высокая.\n\n§RОПИСАНИЕ ЛИЧНОСТИ:§!\nХАРАКТЕР: Сангвиник. Активен, в обсуждениях участвует чаще прочих. Рассудителен, оценивает обстоятельства с точки зрения государственной выгоды.\nПОЛИТИЧЕСКИЕ ВЗГЛЯДЫ: Сторонник примата государства над личностью. Признаёт необходимость сильной армии и твёрдой власти, к войне относится сдержанно. Идеологически совместим с государственническими установками.\nПОВЕДЕНИЕ ПРИ ДОПРОСЕ: Держался собранно, отвечал по существу. Выказал понимание интересов государства и готовность к сотрудничеству.\nПОТЕНЦИАЛЬНАЯ ЦЕННОСТЬ ДЛЯ СССР: ВЫСОКАЯ\nПОЛИТИЧЕСКАЯ БЛАГОНАДЕЖНОСТЬ: СРЕДНЯЯ\n§RЗАКЛЮЧЕНИЕ:§! При надлежащем направлении пригоден к использованию в интересах государства. Рекомендуется к привлечению с последующей проверкой.\nНАРКОМ ВНУТРЕННИХ ДЕЛ Г.Г. Ягода"
 introduction_event.3.a: "Такие люди нужны науке!"

 introduction_event.4.t: "Досье на гр. Океанова"
 introduction_event.4.d: "§RСОВЕРШЕННО СЕКРЕТНО§!\nНКВД СССР\n\nДОСЬЕ №15433\n\nФАМИЛИЯ, ИМЯ, ОТЧЕСТВО: Океанов Евгений —\nДАТА РОЖДЕНИЯ: 27.10.2003\nМЕСТО РОЖДЕНИЯ: г. Москва\nВОЗРАСТ: 22 полных года\n\n§RОСОБЫЕ НАВЫКИ И ЗНАНИЯ:§! Располагает военной подготовкой и опытом командования, поддерживает связи с военными кругами. Владеет музыкальным искусством. Отмечены организаторские способности.\n\n§RОПИСАНИЕ ЛИЧНОСТИ:§!\nХАРАКТЕР: Сдержан, немногословен, в обсуждениях участвует реже прочих ввиду занятости. Способен к руководству группой. Главным для себя считает саморазвитие.\nПОЛИТИЧЕСКИЕ ВЗГЛЯДЫ: Придерживается консервативных взглядов, последователен в приверженности сильному государству и порядку, безопасность ставит выше личных свобод. Исповедует православие и черпает вдохновение в «русском народе», что указывает на религиозные и национально-великодержавные настроения, несовместимые с линией партии. Способен к показной терпимости к чуждым взглядам при необходимости.\nПОВЕДЕНИЕ ПРИ ДОПРОСЕ: Спокоен, дисциплинирован, отвечал чётко, признаков страха не обнаружил. Враждебности к советской власти не выказал.\nПОТЕНЦИАЛЬНАЯ ЦЕННОСТЬ ДЛЯ СССР: ВЫСОКАЯ\nПОЛИТИЧЕСКАЯ БЛАГОНАДЕЖНОСТЬ: СРЕДНЯЯ\n§RЗАКЛЮЧЕНИЕ:§! Организаторские и военные качества представляют значительную ценность. Однако религиозность и великодержавные настроения требуют пристального внимания; преданность субъекта надлежит своевременно направить на надлежащий предмет.\nНАРКОМ ВНУТРЕННИХ ДЕЛ Г.Г. Ягода"
 introduction_event.4.a: "Честь и почет истинному воину!"

 introduction_event.5.t: "Досье на гр. С. Павлова"
 introduction_event.5.d: "§RСОВЕРШЕННО СЕКРЕТНО§!\nНКВД СССР\n\nДОСЬЕ №15434\n\nФАМИЛИЯ, ИМЯ, ОТЧЕСТВО: Павлов Степан —\nДАТА РОЖДЕНИЯ: 26.08.2006\nМЕСТО РОЖДЕНИЯ: г. Саранск\nВОЗРАСТ: 19 полных лет\n\n§RОСОБЫЕ НАВЫКИ И ЗНАНИЯ:§! По роду занятий — учитель. Отличается широкой начитанностью; познания носят отвлечённый характер, практического применения почти не имеют. Отмечен интерес к продукции японского рисованного синематографа — обстоятельство, ввиду намерений Японской империи, подлежащее проверке.\n\n§RОПИСАНИЕ ЛИЧНОСТИ:§!\nХАРАКТЕР: Уравновешен, уступчив, конфликтов избегает.\nПОЛИТИЧЕСКИЕ ВЗГЛЯДЫ: Определённой позиции не занимает, политику отвергает, во всём придерживается срединной линии. Последовательно выступает против войны. Отсутствие классовой позиции само по себе подлежит вниманию.\nПОВЕДЕНИЕ ПРИ ДОПРОСЕ: Держался смирно, следователю не противоречил, ценных сведений не сообщил за неимением таковых.\nПОТЕНЦИАЛЬНАЯ ЦЕННОСТЬ ДЛЯ СССР: НИЗКАЯ\nПОЛИТИЧЕСКАЯ БЛАГОНАДЕЖНОСТЬ: СРЕДНЯЯ\n§RЗАКЛЮЧЕНИЕ:§! Практическая ценность незначительна, явная опасность не установлена. Однофамилец задержанного А. Павлова; родственная связь не установлена. Допустимо использование на просветительском направлении под надзором.\nНАРКОМ ВНУТРЕННИХ ДЕЛ Г.Г. Ягода"
 introduction_event.5.a: "Уж не знаю, почему, но он мне нравится."

 introduction_event.6.t: "Досье на гр. Данченко"
 introduction_event.6.d: "§RСОВЕРШЕННО СЕКРЕТНО§!\nНКВД СССР\n\nДОСЬЕ №15435\n\nФАМИЛИЯ, ИМЯ, ОТЧЕСТВО: Данченко Иван —\nДАТА РОЖДЕНИЯ: 08.11.2009\nМЕСТО РОЖДЕНИЯ: г. Минск, БССР\nВОЗРАСТ: 16 полных лет\n\n§RОСОБЫЕ НАВЫКИ И ЗНАНИЯ:§! Обучается на инженера воздушного флота, специализируется на авиации. Познания в устройстве летательных аппаратов перспективных образцов представляют первостепенную ценность для оборонной промышленности.\n\n§RОПИСАНИЕ ЛИЧНОСТИ:§!\nХАРАКТЕР: Сангвиник, активен. По складу близок к задержанному Попову, предположительно состоит с ним в дружеских отношениях. Главным для себя считает науку и исследования.\nПОЛИТИЧЕСКИЕ ВЗГЛЯДЫ: Государственник, сторонник сильной державы; вместе с тем выраженной политической позиции не занимает, придерживается умеренных взглядов и поглощён научно-техническими интересами. Вдохновляется идеей освоения воздушного и космического пространства. К войне относится с осторожностью. Уроженец Белорусской ССР.\nПОВЕДЕНИЕ ПРИ ДОПРОСЕ: Отвечал уверенно, подробно излагал сведения о воздушном флоте. Угрозы не представляет.\nПОТЕНЦИАЛЬНАЯ ЦЕННОСТЬ ДЛЯ СССР: ВЫСОКАЯ\nПОЛИТИЧЕСКАЯ БЛАГОНАДЕЖНОСТЬ: ВЫСОКАЯ\n§RЗАКЛЮЧЕНИЕ:§! Познания в области авиастроения делают субъекта особо ценным для Военно-Воздушных Сил. Рекомендуется к привлечению к конструкторским работам в кратчайший срок.\nНАРКОМ ВНУТРЕННИХ ДЕЛ Г.Г. Ягода"
 introduction_event.6.a: "Разам мы паднімем нашы самалёты ў неба!"

 introduction_event.7.t: "Досье на гр. Рычкова"
 introduction_event.7.d: "§RСОВЕРШЕННО СЕКРЕТНО§!\nНКВД СССР\n\nДОСЬЕ №15436\n\nФАМИЛИЯ, ИМЯ, ОТЧЕСТВО: Рычков Глеб —\nДАТА РОЖДЕНИЯ: 01.01.2007\nМЕСТО РОЖДЕНИЯ: г. Саратов\nВОЗРАСТ: 19 полных лет\n\n§RОСОБЫЕ НАВЫКИ И ЗНАНИЯ:§! Обучается специальности по вычислительным машинам, сведущ в охране секретных сведений. Представляет ценность как для научного, так и для оперативного направления.\n\n§RОПИСАНИЕ ЛИЧНОСТИ:§!\nХАРАКТЕР: Флегматик. Невозмутим, в спорах не участвует, сохраняет ровное поведение в любых обстоятельствах. Отмечены способности к посредничеству и улаживанию разногласий.\nПОЛИТИЧЕСКИЕ ВЗГЛЯДЫ: По собственному признанию, ранее придерживался либеральных взглядов, впоследствии сменил их на государственнические и военные. Резкая перемена убеждений подлежит проверке на искренность.\nПОВЕДЕНИЕ ПРИ ДОПРОСЕ: Держался ровно, отвечал обдуманно, волнения не обнаружил. Чрезмерное самообладание отмечается как обстоятельство, требующее внимания.\nПОТЕНЦИАЛЬНАЯ ЦЕННОСТЬ ДЛЯ СССР: ВЫСОКАЯ\nПОЛИТИЧЕСКАЯ БЛАГОНАДЕЖНОСТЬ: СРЕДНЯЯ\n§RЗАКЛЮЧЕНИЕ:§! Ценен познаниями и способностью к посредничеству. Искренность перемены убеждений подлежит проверке на деле.\nНАРКОМ ВНУТРЕННИХ ДЕЛ Г.Г. Ягода"
 introduction_event.7.a: "Истинный патриот"

 introduction_event.8.t: "Досье на гр. Икономиди"
 introduction_event.8.d: "§RСОВЕРШЕННО СЕКРЕТНО§!\nНКВД СССР\n\nДОСЬЕ №15437\n\nФАМИЛИЯ, ИМЯ, ОТЧЕСТВО: Икономиди Демокрит Васильевич\nДАТА РОЖДЕНИЯ: 14.12.2007\nМЕСТО РОЖДЕНИЯ: г. Свердловск (происхождение греческое)\nВОЗРАСТ: 18 полных лет\n\n§RОСОБЫЕ НАВЫКИ И ЗНАНИЯ:§! Отмечена выраженная склонность к торговой и предпринимательской деятельности — наклонность, для советского гражданина недопустимая, характерная для нэпманского элемента. По собственным словам, один из учредителей группы.\n\n§RОПИСАНИЕ ЛИЧНОСТИ:§!\nХАРАКТЕР: Активен, практичен, разговорчив. Главной целью называет «совершенствование мира».\nПОЛИТИЧЕСКИЕ ВЗГЛЯДЫ: Заявляет о приверженности социалистическим взглядам, что не согласуется с предпринимательскими наклонностями, с исповедуемым православием и с выраженными патриотическими чувствами к Греции. Вдохновляется идеями освоения космоса и горными ландшафтами. Приверженность иностранному государству у инородного по происхождению элемента и религиозность представляют тревожные обстоятельства.\nПОВЕДЕНИЕ ПРИ ДОПРОСЕ: Отвечал подробно, неоднократно упоминал Грецию, в социалистических убеждениях заверял настойчиво, что снижает их убедительность.\nПОТЕНЦИАЛЬНАЯ ЦЕННОСТЬ ДЛЯ СССР: СРЕДНЯЯ\nПОЛИТИЧЕСКАЯ БЛАГОНАДЕЖНОСТЬ: НИЗКАЯ\n§RЗАКЛЮЧЕНИЕ:§! Сочетание социалистической риторики с частнопредпринимательскими наклонностями, религиозностью и инородческим патриотизмом характеризует субъекта как противоречивого и неблагонадёжного. Подлинность имени и фамилии подлежит проверке.\nНАРКОМ ВНУТРЕННИХ ДЕЛ Г.Г. Ягода"
 introduction_event.8.a: "Интересно, его правда так зовут? Нужно уточнить у стенографиста"

 introduction_event.9.t: "Досье на гр. А. Павлова"
 introduction_event.9.d: "§RСОВЕРШЕННО СЕКРЕТНО§!\nНКВД СССР\n\nДОСЬЕ №15438\n\nФАМИЛИЯ, ИМЯ, ОТЧЕСТВО: Павлов Арсений —\nДАТА РОЖДЕНИЯ: 21.02.2007\nМЕСТО РОЖДЕНИЯ: г. Калинин\nВОЗРАСТ: 18 полных лет\n\n§RОСОБЫЕ НАВЫКИ И ЗНАНИЯ:§! Сведения о роде занятий неполны. Гуманитарного склада, без выраженных практических навыков; превыше всего ставит искусство и красоту человека.\n\n§RОПИСАНИЕ ЛИЧНОСТИ:§!\nХАРАКТЕР: Сдержан, уступчив, доброжелателен. По манере поведения схож с задержанным С. Павловым (однофамилец, родственная связь не установлена).\nПОЛИТИЧЕСКИЕ ВЗГЛЯДЫ: Публично занимает безразличную к политике позицию. Вместе с тем по собранным сведениям придерживается буржуазно-либеральных и светско-гуманистических взглядов, сходных с установками гр. Якушина. Достоверно установить степень их совпадения преждевременно.\nПОВЕДЕНИЕ ПРИ ДОПРОСЕ: Держался смирно, во всём соглашался, в предосудительном не уличён. Производит впечатление безобидное; степень безобидности вызывает сомнения.\nПОТЕНЦИАЛЬНАЯ ЦЕННОСТЬ ДЛЯ СССР: НИЗКАЯ\nПОЛИТИЧЕСКАЯ БЛАГОНАДЕЖНОСТЬ: СРЕДНЯЯ\n§RЗАКЛЮЧЕНИЕ:§! По внешним признакам благонадёжен, однако расхождение между публичной отстранённостью и собранными сведениями о его взглядах требует внимания: не скрывает ли субъект убеждения, сходные с деятелями <ДАННЫЕ УДАЛЕНЫ>. Наблюдение продолжить.\nНАРКОМ ВНУТРЕННИХ ДЕЛ Г.Г. Ягода"
 introduction_event.9.a: "Кого-то он мне напоминает..."

#Ивенты решений
 campaign_event.1.t: "Армия справляется с задачей"
 campaign_event.1.d: "Задействованные войска успешно выполнили поставленную задачу. Все лица, причастные к Инциденту 'Б', были найдены и изолированы. Однако не обошлось без арестов непричастных и погромов, что вызвало некоторое недовольство среди населения. Тем не менее, информация о происшествии была эффективно сокрыта (вместе с носителями), и дальнейшее распространение сведений удалось предотвратить."
 campaign_event.1.a: "Армия выполнила свою задачу, нравится вам это или нет."

 campaign_event.2.t: "НКВД берет ситуацию под контроль"
 campaign_event.2.d: "Дополнительные ресурсы, выделенные на устранение последствий инцидента, наконец дали свои плоды. НКВД успешно взял ситуацию под контроль. Все лица, причастные к Инциденту 'Б', были найдены и арестованы. Благодаря решительным действиям НКВД дальнейшее распространение информации было эффективно предотвращено, и ситуация стабилизировалась."
 campaign_event.2.a: "НКВД - карающий меч диктатуры рабочего класса."

 campaign_event.3.t: "Пропаганда сработала"
 campaign_event.3.d: "Наши пропагандистские усилия увенчались успехом. Государственные СМИ эффективно дискредитировали свидетелей и представили альтернативную версию событий, что помогло успокоить общественность и предотвратить распространение слухов. Хотя некоторые люди все еще сомневаются, большинство приняли официальную версию событий."
 campaign_event.3.a: "Газета — не только коллективный пропагандист и коллективный агитатор, но также и коллективный организатор"

 campaign_event.4.t: "Волнения уменьшаются"
 campaign_event.4.d: "Похоже, стратегия невмешательства не была ошибочной. С течением времени общественное внимание к инциденту начинает ослабевать, и можно назвать кампанию по замалчиванию успешной. Хотя некоторые люди все еще обсуждают произошедшее, большинство уже не проявляют к этому интереса."
 campaign_event.4.a: "Иногда лучше всего просто не вмешиваться"

 campaign_event.5.t: "Инцидент полностью пропал с повестки дня"
 campaign_event.5.d: "Это было наилучшее решение из возможных. Люди, привыкшие не доверять пропаганде, быстро потеряли интерес к инциденту благодаря отсутствию внимания со стороны государства. В результате инцидент 'Б' полностью исчез из общественного сознания, и дальнейшее распространение информации было успешно предотвращено."
 campaign_event.5.a: "Слово — серебро, молчание — золото"

 campaign_event.6.t: "Волнения нарастают"
 campaign_event.6.d: "Пассивность и нерешительность партии обернулись катастрофой. Слухи и недовольство распространяются, и ситуация выходит из-под контроля. Люди начинают открыто выражать свое недовольство и требовать раскрытия правды, а правительство сталкивается с растущими трудностями в попытках сохранить порядок. Инцидент 'Б' становится центральной темой общественного обсуждения, и дальнейшее распространение информации становится неизбежным."
 campaign_event.6.a: "Кого-то стоит за это расстрелять"

