# 孝褍谢褌懈锌褘 懈写械芯谢芯谐懈泄
# 拢GFX_...拢 胁褋褌邪胁谢褟械褌 懈泻芯薪泻褍-褋懈屑胁芯谢 胁 褋褌褉芯泻褍.
 MCKSP_PT_NIKITA:0 "拢GFX_MCKSP_ideo_sym_nikita拢 搂Y小芯褑懈邪谢-谢懈斜械褉邪谢懈蟹屑搂!\n------------------------\n袧懈泻懈褌邪 携泻褍褕懈薪\n\n袛芯泻褌褉懈薪邪 锌褉芯谐褉械褋褋懈胁薪芯泄 写械屑芯泻褉邪褌懈懈. 小芯褑懈邪谢褜薪芯械 谐芯褋褍写邪褉褋褌胁芯, 谐褉邪卸写邪薪褋泻懈械 褋胁芯斜芯写褘, 褉械谐褍谢懈褉褍械屑褘泄 褉褘薪芯泻, 邪泻褌懈胁薪邪褟 褉芯谢褜 谐芯褋褍写邪褉褋褌胁邪 胁 芯斜械褋锌械褔械薪懈懈 褉邪胁械薪褋褌胁邪 胁芯蟹屑芯卸薪芯褋褌械泄.\n\n协泻芯薪芯屑懈褔械褋泻邪褟 芯褋褜: 搂Y-2搂! (谢械胁芯)\n小芯褑懈邪谢褜薪邪褟 芯褋褜: 搂Y-5搂! (谢懈斜械褉褌邪褉薪芯褋褌褜)"
 MCKSP_PT_ARSENY:0 "拢GFX_MCKSP_ideo_sym_arseny拢 搂Y袥懈斜械褉邪谢褜薪褘泄 谐褍屑邪薪懈蟹屑搂!\n------------------------\n袗褉褋械薪懈泄 袩邪胁谢芯胁\n\n袚褍屑邪薪懈褋褌懈褔械褋泻懈泄 谢懈斜械褉邪谢懈蟹屑 褋 邪泻褑械薪褌芯屑 薪邪 锌褉邪胁邪褏 褔械谢芯胁械泻邪, 屑薪芯谐芯芯斜褉邪蟹懈懈 懈 褌芯谢械褉邪薪褌薪芯褋褌懈. 袦懈薪懈屑邪谢褜薪芯械 胁屑械褕邪褌械谢褜褋褌胁芯 谐芯褋褍写邪褉褋褌胁邪 胁 谢懈褔薪褘械 写械谢邪, 蟹邪褖懈褌邪 褍褟蟹胁懈屑褘褏 谐褉褍锌锌.\n\n协泻芯薪芯屑懈褔械褋泻邪褟 芯褋褜: 搂Y-1搂! (谢械胁芯)\n小芯褑懈邪谢褜薪邪褟 芯褋褜: 搂Y-4搂! (谢懈斜械褉褌邪褉薪芯褋褌褜)"
 MCKSP_PT_DEMOKRIT:0 "拢GFX_MCKSP_ideo_sym_demokrit拢 搂Y袪褘薪芯褔薪褘泄 褋芯褑懈邪谢懈蟹屑搂!\n------------------------\n袛械屑芯泻褉懈褌 袠泻芯薪芯屑懈写懈\n\n小芯褑懈邪谢懈蟹屑 褋 褉褘薪芯褔薪褘屑懈 屑械褏邪薪懈蟹屑邪屑懈. 袨斜褖械褋褌胁械薪薪邪褟 褋芯斜褋褌胁械薪薪芯褋褌褜 薪邪 泻谢褞褔械胁褘械 芯褌褉邪褋谢懈, 褉褘薪芯褔薪芯械 褉邪褋锌褉械写械谢械薪懈械 胁 锌芯褌褉械斜懈褌械谢褜褋泻芯屑 褋械泻褌芯褉械, 褉邪斜芯褔械械 褋邪屑芯褍锌褉邪胁谢械薪懈械.\n\n协泻芯薪芯屑懈褔械褋泻邪褟 芯褋褜: 搂Y-5搂! (谢械胁芯)\n小芯褑懈邪谢褜薪邪褟 芯褋褜: 搂Y+1搂! (邪胁褌芯褉懈褌邪褉薪芯褋褌褜)"
 MCKSP_PT_GLEB:0 "拢GFX_MCKSP_ideo_sym_gleb拢 搂Y袩褉邪谐屑邪褌懈褔薪褘泄 褋懈薪泻褉械褌懈蟹屑搂!\n------------------------\n袚谢械斜 袪褘褔泻芯胁\n\n小懈薪褌械蟹 褉邪蟹薪褘褏 懈写械芯谢芯谐懈褔械褋泻懈褏 褌褉邪写懈褑懈泄. 袩褉邪谐屑邪褌懈褔薪褘泄 锌芯写褏芯写 泻 褍锌褉邪胁谢械薪懈褞, 芯褌泻邪蟹 芯褌 写芯谐屑邪褌懈蟹屑邪, 胁褘斜芯褉 谢褍褔褕械谐芯 懈蟹 锌褉芯褌懈胁芯锌芯谢芯卸薪褘褏 褋懈褋褌械屑 锌芯 芯斜褋褌芯褟褌械谢褜褋褌胁邪屑.\n\n协泻芯薪芯屑懈褔械褋泻邪褟 芯褋褜: 搂Y+1搂! (锌褉邪胁芯)\n小芯褑懈邪谢褜薪邪褟 芯褋褜: 搂Y+1搂! (邪胁褌芯褉懈褌邪褉薪芯褋褌褜)"
 MCKSP_PT_STEPAN:0 "拢GFX_MCKSP_ideo_sym_stepan拢 搂Y啸褉懈褋褌懈邪薪褋泻邪褟 写械屑芯泻褉邪褌懈褟搂!\n------------------------\n小褌械锌邪薪 袩邪胁谢芯胁\n\n小芯褞蟹 褏褉懈褋褌懈邪薪褋泻懈褏 褑械薪薪芯褋褌械泄 褋 褋芯褑懈邪谢褜薪芯泄 写械屑芯泻褉邪褌懈械泄. 小械屑褜褟, 褌褉邪写懈褑懈褟, 褋芯谢懈写邪褉薪芯褋褌褜, 褋芯褑懈邪谢褜薪邪褟 褋锌褉邪胁械写谢懈胁芯褋褌褜 褔械褉械蟹 泻芯谢谢械泻褌懈胁薪褍褞 芯褌胁械褌褋褌胁械薪薪芯褋褌褜.\n\n协泻芯薪芯屑懈褔械褋泻邪褟 芯褋褜: 搂Y+2搂! (锌褉邪胁芯)\n小芯褑懈邪谢褜薪邪褟 芯褋褜: 搂Y+2搂! (邪胁褌芯褉懈褌邪褉薪芯褋褌褜)"
 MCKSP_PT_IVAN:0 "拢GFX_MCKSP_ideo_sym_ivan拢 搂Y孝械褏薪芯泻褉邪褌懈褔械褋泻懈泄 锌褉芯谐褉械褋褋懈胁懈蟹屑搂!\n------------------------\n袠胁邪薪 袛邪薪褔械薪泻芯\n\n袠写械芯谢芯谐懈褟 薪邪褍褔薪芯-褌械褏薪懈褔械褋泻芯谐芯 锌褉芯谐褉械褋褋邪. 协褎褎械泻褌懈胁薪芯械 褍锌褉邪胁谢械薪懈械 薪邪 芯褋薪芯胁械 写邪薪薪褘褏, 懈薪胁械褋褌懈褑懈懈 胁 薪邪褍泻褍 懈 芯斜褉邪蟹芯胁邪薪懈械, 褉邪褑懈芯薪邪谢褜薪芯械 锌谢邪薪懈褉芯胁邪薪懈械.\n\n协泻芯薪芯屑懈褔械褋泻邪褟 芯褋褜: 搂Y+1搂! (锌褉邪胁芯)\n小芯褑懈邪谢褜薪邪褟 芯褋褜: 搂Y+4搂! (邪胁褌芯褉懈褌邪褉薪芯褋褌褜)"
 MCKSP_PT_ILYA:0 "拢GFX_MCKSP_ideo_sym_ilya拢 搂Y袚芯褋褍写邪褉褋褌胁械薪薪邪褟 褌械褏薪芯泻褉邪褌懈褟搂!\n------------------------\n袠谢褜褟 袩芯锌芯胁\n\n小懈谢褜薪芯械 谐芯褋褍写邪褉褋褌胁芯, 褍锌褉邪胁谢褟械屑芯械 褌械褏薪芯泻褉邪褌懈褔械褋泻芯泄 褝谢懈褌芯泄. 袦械褉懈褌芯泻褉邪褌懈褟, 锌谢邪薪芯胁邪褟 褝泻芯薪芯屑懈泻邪, 褑械薪褌褉邪谢懈蟹芯胁邪薪薪芯械 锌褉懈薪褟褌懈械 褉械褕械薪懈泄 薪邪 薪邪褍褔薪芯泄 芯褋薪芯胁械.\n\n协泻芯薪芯屑懈褔械褋泻邪褟 芯褋褜: 搂Y+2搂! (锌褉邪胁芯)\n小芯褑懈邪谢褜薪邪褟 芯褋褜: 搂Y+6搂! (邪胁褌芯褉懈褌邪褉薪芯褋褌褜)"
 MCKSP_PT_EVGENY:0 "拢GFX_MCKSP_ideo_sym_evgeny拢 搂Y袧邪褑懈芯薪邪谢-泻芯薪褋械褉胁邪褌懈蟹屑搂!\n------------------------\n袝胁谐械薪懈泄 袨泻械邪薪芯胁\n\n袟邪褖懈褌邪 薪邪褑懈芯薪邪谢褜薪芯泄 懈写械薪褌懈褔薪芯褋褌懈, 褌褉邪写懈褑懈泄 懈 褋褍胁械褉械薪懈褌械褌邪. 小懈谢褜薪芯械 谐芯褋褍写邪褉褋褌胁芯, 褌褉邪写懈褑懈芯薪薪褘械 褑械薪薪芯褋褌懈, 褝泻芯薪芯屑懈褔械褋泻懈泄 锌邪褌褉懈芯褌懈蟹屑.\n\n协泻芯薪芯屑懈褔械褋泻邪褟 芯褋褜: 搂Y+4搂! (锌褉邪胁芯)\n小芯褑懈邪谢褜薪邪褟 芯褋褜: 搂Y+8搂! (邪胁褌芯褉懈褌邪褉薪芯褋褌褜)"
 MCKSP_PT_ARTEM:0 "拢GFX_MCKSP_ideo_sym_artem拢 搂Y袛械屑芯泻褉邪褌懈褔械褋泻懈泄 褋芯褑懈邪谢懈蟹屑搂!\n------------------------\n袗褉褌褢屑 袗褞褕械械胁\n\n小芯褑懈邪谢懈蟹屑 褋 褔械谢芯胁械褔械褋泻懈屑 谢懈褑芯屑. 袩械褉械褋褌褉芯泄泻邪 懈 谐谢邪褋薪芯褋褌褜, 褔邪褋褌懈褔薪褘泄 锌械褉械褏芯写 薪邪 褉褘薪芯褔薪褘械 褉械谢褜褋褘 锌褉懈 褋芯褏褉邪薪械薪懈懈 芯斜褖械褋褌胁械薪薪芯泄 褋芯斜褋褌胁械薪薪芯褋褌懈 薪邪 泻谢褞褔械胁褘械 芯褌褉邪褋谢懈. 袣褍褉褋 褉械褎芯褉屑 锌芯 芯斜褉邪蟹褑褍 袚芯褉斜邪褔褢胁邪 懈 袛褝薪 小褟芯锌懈薪邪.\n\n协泻芯薪芯屑懈褔械褋泻邪褟 芯褋褜: 搂Y-4搂! (谢械胁芯)\n小芯褑懈邪谢褜薪邪褟 芯褋褜: 搂Y-2搂! (谢懈斜械褉褌邪褉薪芯褋褌褜)"
 MCKSP_PT_ILGAM:0 "拢GFX_MCKSP_ideo_sym_ilgam拢 搂Y啸褍褋褌懈褋懈邪谢懈蟹屑搂!\n------------------------\n袠谢褜谐邪屑 肖邪谐邪屑邪薪芯胁\n\n袛芯泻褌褉懈薪邪 芦褌褉械褌褜械谐芯 锌褍褌懈禄 屑械卸写褍 泻邪锌懈褌邪谢懈蟹屑芯屑 懈 屑邪褉泻褋懈蟹屑芯屑. 孝褉懈 芯锌芯褉褘: 褋芯褑懈邪谢褜薪邪褟 褋锌褉邪胁械写谢懈胁芯褋褌褜, 褝泻芯薪芯屑懈褔械褋泻懈泄 褋褍胁械褉械薪懈褌械褌 懈 锌芯谢懈褌懈褔械褋泻邪褟 薪械蟹邪胁懈褋懈屑芯褋褌褜. 袨锌芯褉邪 薪邪 芯褉谐邪薪懈蟹芯胁邪薪薪褘泄 褌褉褍写, 泻芯褉锌芯褉邪褌懈胁懈蟹屑 懈 褋懈谢褜薪褍褞 薪邪褉芯写薪褍褞 胁谢邪褋褌褜.\n\n协泻芯薪芯屑懈褔械褋泻邪褟 芯褋褜: 搂Y-3搂! (谢械胁芯)\n小芯褑懈邪谢褜薪邪褟 芯褋褜: 搂Y+5搂! (邪胁褌芯褉懈褌邪褉薪芯褋褌褜)"

