# Ивенты баланса доверия
 trust_event.1.t:0 "Новые члены ВКП(б)"
 trust_event.1.d:0 "Иосиф Виссарионович лично рассмотрел итоги многолетней работы группы гостей. Сомнений не осталось: эти люди доказали свою преданность делу социализма не словом, а делом. Сегодня в торжественной обстановке всем десятерым вручены партийные билеты ВКП(б). Отныне они — не подследственные и не подопечные НКВД, а полноправные члены партии, которым доверены ключевые посты в науке, армии и государственном аппарате. Их голос отныне будет звучать на пленумах ЦК."
 trust_event.1.a:0 "Заслужили."

 trust_event.2.t:0 "Решение принято"
 trust_event.2.d:0 "Терпение вождя иссякло. Доклады НКВД лежат стопкой на столе — каждый обвинительнее предыдущего. Заговоры, утечки, чуждые идеологии, подозрительные связи. Сегодня ночью все десять гостей из будущего были арестованы по ордерам, подписанным лично товарищем Сталиным. Через три дня закрытая «тройка» вынесла приговор: высшая мера наказания. Тела захоронены безымянно. О существовании гостей из будущего отныне не должно быть упомянуто в советской прессе — никогда."
 trust_event.2.a:0 "Ошибка исправлена."

