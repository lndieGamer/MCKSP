 trust_event.2.t:0 "袪械褕械薪懈械 锌褉懈薪褟褌芯"
 trust_event.2.d:0 "孝械褉锌械薪懈械 胁芯卸写褟 懈褋褋褟泻谢芯. 袛芯泻谢邪写褘 袧袣袙袛 谢械卸邪褌 褋褌芯锌泻芯泄 薪邪 褋褌芯谢械 - 泻邪卸写褘泄 芯斜胁懈薪懈褌械谢褜薪械械 锌褉械写褘写褍褖械谐芯. 袟邪谐芯胁芯褉褘, 褍褌械褔泻懈, 褔褍卸写褘械 懈写械芯谢芯谐懈懈, 锌芯写芯蟹褉懈褌械谢褜薪褘械 褋胁褟蟹懈. 小械谐芯写薪褟 薪芯褔褜褞 胁褋械 写械褋褟褌褜 谐芯褋褌械泄 懈蟹 斜褍写褍褖械谐芯 斜褘谢懈 邪褉械褋褌芯胁邪薪褘 锌芯 芯褉写械褉邪屑, 锌芯写锌懈褋邪薪薪褘屑 谢懈褔薪芯 褌芯胁邪褉懈褖械屑 小褌邪谢懈薪褘屑. 效械褉械蟹 褌褉懈 写薪褟 蟹邪泻褉褘褌邪褟 芦褌褉芯泄泻邪禄 胁褘薪械褋谢邪 锌褉懈谐芯胁芯褉: 胁褘褋褕邪褟 屑械褉邪 薪邪泻邪蟹邪薪懈褟. 孝械谢邪 蟹邪褏芯褉芯薪械薪褘 斜械蟹褘屑褟薪薪芯. 袨 褋褍褖械褋褌胁芯胁邪薪懈懈 谐芯褋褌械泄 懈蟹 斜褍写褍褖械谐芯 芯褌薪褘薪械 薪械 写芯谢卸薪芯 斜褘褌褜 褍锌芯屑褟薪褍褌芯 胁 褋芯胁械褌褋泻芯泄 锌褉械褋褋械 - 薪懈泻芯谐写邪."
 trust_event.2.a:0 "袨褕懈斜泻邪 懈褋锌褉邪胁谢械薪邪."

