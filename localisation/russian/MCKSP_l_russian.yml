 something_maybe_happened_idea:0 "袩芯褏芯卸械, 褔褌芯-褌芯 锌褉芯懈褋褏芯写懈褌.."
 something_maybe_happened_idea_desc:0 "袩芯 袙袣袩(斜) 褏芯写褟褌 褋谢褍褏懈 芯 褌邪懈薪褋褌胁械薪薪芯屑 写芯泻谢邪写械 携谐芯写褘 小褌邪谢懈薪褍. 袧懈泻褌芯 薪械 蟹薪邪械褌 锌芯写褉芯斜薪芯褋褌械泄, 薪芯 褟褋薪芯 芯写薪芯 - 褔褌芯-褌芯 锌褉芯懈褋褏芯写懈褌. 袥褞写懈 薪邪褔懈薪邪褞褌 胁芯谢薪芯胁邪褌褜褋褟, 懈 锌褉邪胁懈褌械谢褜褋褌胁芯 写芯谢卸薪芯 褉邪蟹芯斜褉邪褌褜褋褟 胁 褋懈褌褍邪褑懈懈."

 something_happened_idea:0 "效褌芯-褌芯 锌褉芯懈蟹芯褕谢芯."
 something_happened_idea_desc:0 "袙褋械 斜芯谢褜褕械 谢褞写械泄 薪邪褔懈薪邪褞褌 谐芯胁芯褉懈褌褜 芯 褋褌褉邪薪薪褘褏 褋芯斜褘褌懈褟褏, 泻芯褌芯褉褘械 锌褉芯懈褋褏芯写褟褌 胁 褋褌芯谢懈褑械. 袛芯泻谢邪写 胁褘褋芯褔邪泄褕械谐芯 褍褉芯胁薪褟 褋械泻褉械褌薪芯褋褌懈 懈 写邪薪薪褘械 懈蟹 屑懈谢懈褑械泄褋泻芯谐芯 芯褌褔械褌邪 芯斜 邪褉械褋褌械 褋褌褉邪薪薪褘褏 谢褞写械泄 - 泻邪泻 斜褘褋褌褉芯 泻褌芯-褌芯 褋屑芯卸械褌 褋谢芯卸懈褌褜 2 懈 2?"

 something_definetely_happened_idea:0 "效褌芯-褌芯 袨袩袪袝袛袝袥袝袧袧袨 锌褉芯懈褋褏芯写懈褌"
 something_definetely_happened_idea_desc:0 "小谢褍褏懈 芯 锌褉芯懈褋褏芯写褟褖械屑 褉邪褋锌褉芯褋褌褉邪薪褟褞褌褋褟 锌芯 袦芯褋泻胁械 胁褋械 斜褘褋褌褉械械. 袥褞写懈 薪邪褔懈薪邪褞褌 锌邪薪懈泻芯胁邪褌褜, 懈 锌褉邪胁懈褌械谢褜褋褌胁芯 写芯谢卸薪芯 写械泄褋褌胁芯胁邪褌褜 斜褘褋褌褉芯, 褔褌芯斜褘 锌褉械写芯褌胁褉邪褌懈褌褜 胁芯蟹屑芯卸薪褘泄 泻褉懈蟹懈褋."

 guests_from_future_idea:0 "袚芯褋褌懈 懈蟹 斜褍写褍褖械谐芯"
 guests_from_future_idea_desc:0 "啸芯写褟褌 褋谢褍褏懈, 褔褌芯 胁 褋褌褉邪薪褍 锌褉懈斜褘谢邪 谐褉褍锌锌邪 薪械蟹薪邪泻芯屑褑械胁 懈蟹 斜褍写褍褖械谐芯. 袧械褋屑芯褌褉褟 薪邪 褍褋懈谢懈褟 袧袣袙袛, 褋褉械写懈 薪邪褋械谢械薪懈褟 薪邪褔懈薪邪械褌 褉邪褋褌懈 锌邪薪懈泻邪. 袨写薪邪泻芯 薪邪褍褔薪芯-懈褋褋谢械写芯胁邪褌械谢褜褋泻懈械 懈薪褋褌懈褌褍褌褘 褋芯胁屑械褋褌薪芯 锌褉芯胁芯写褟褌 懈褋褋谢械写芯胁邪薪懈褟, 芯褋薪芯胁邪薪薪褘械 薪邪 褌芯屑, 褔褌芯 褍写邪谢芯褋褜 褍蟹薪邪褌褜 褍 薪懈褏, 褔褌芯斜褘 懈褋锌芯谢褜蟹芯胁邪褌褜 褌械褏薪芯谢芯谐懈懈 斜褍写褍褖械谐芯 薪邪 斜谢邪谐芯 褋褌褉邪薪褘."

# Override vanilla-懈写械懈 home_of_revolution 锌芯写 薪芯胁褘泄 褝褎褎械泻褌 (芯斜芯褉芯薪邪 薪邪褑. 褌械褉褉懈褌芯褉懈懈).
 home_of_revolution:0 "袪芯写懈薪邪 褉械胁芯谢褞褑懈懈"
 home_of_revolution_desc:0 "孝芯胁邪褉懈褖懈, 褉邪蟹谐褉芯屑懈胁 褌褉芯褑泻懈褋褌褋泻懈褏 泻芯薪褌褉褉械胁芯谢褞褑懈芯薪械褉芯胁, 屑褘 褋锌谢芯褌懈谢懈褋褜 胁芯泻褉褍谐 蟹邪褖懈褌褘 褋芯褑懈邪谢懈褋褌懈褔械褋泻芯谐芯 芯褌械褔械褋褌胁邪. 袣邪卸写褘泄 褉褍斜械卸 褉芯写薪芯泄 蟹械屑谢懈 斜褍写械褌 芯斜芯褉芯薪褟褌褜褋褟 写芯 锌芯褋谢械写薪械谐芯 - 蟹写械褋褜, 薪邪 褋芯胁械褌褋泻芯泄 褌械褉褉懈褌芯褉懈懈, 褉械胁芯谢褞褑懈褟 薪械锌褉懈褋褌褍锌薪邪."

