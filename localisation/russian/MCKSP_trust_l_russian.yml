 scapegoat_event.2.t: "Подготовка к задержанию"
 scapegoat_event.2.d: "НКВД готов выехать. Бумаги подписаны, маршрут проложен. Остаётся отдать приказ - или отступить, пока не поздно."
 scapegoat_event.2.order: "Отдать приказ"
 scapegoat_event.2.order_tt: "§RЭто приведёт к непредсказуемым последствиям...§!"
 scapegoat_event.2.cancel: "Отменить операцию"

 scapegoat_event.4.t: "Приговор приведён в исполнение"
 scapegoat_event.4.d: "Операция прошла без сучка и задоринки. Выбранный гость арестован, осуждён и расстрелян как враг народа. Его партия объявлена вне закона. Товарищ Сталин доволен нашей бдительностью."
 scapegoat_event.4.a: "Так погибнут все враги революции"

 scapegoat_event.5.t: "Враг ускользнул"
 scapegoat_event.5.d: "Что-то пошло не так. Предупреждённый кем-то, наш «козёл отпущения» успел пересечь границу и теперь поливает грязью советскую власть из-за рубежа. Вождь в ярости."
 scapegoat_event.5.a: "Чёрт возьми!"
 scapegoat_event.5.b: "Поймай меня, если сможешь..."
