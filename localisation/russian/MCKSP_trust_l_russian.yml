 # --- 2-а Подарок из будущего ---
 SOV_gift_from_future_tt: "Даёт случайную следующую технологию в одной из веток"
 SOV_gift_from_future: "Подарок из будущего"
 SOV_gift_from_future_desc: "Передать товарищу Сталину одну из технологий, привезённых из будущего. Жест доброй воли укрепит его доверие, но отвлечёт учёных от текущих работ."

 # --- 2-б Публичная присяга Вождю ---
 SOV_public_oath: "Публичная присяга Вождю"
 SOV_public_oath_desc: "Вывести гостей на трибуну и заставить публично присягнуть товарищу Сталину. Доверие резко вырастет, но народ разочаруется в наших партиях.\n\nРазовое. Доступно, если хотя бы у одной партии гостей 10%+."

 # --- 2-в Козёл отпущения ---
 SOV_scapegoat: "Козёл отпущения"
 SOV_scapegoat_desc: "По наводке самих гостей организовать на съезде КПСС арест одного из них. Если операция удастся - доверие Сталина взлетит. Если провалится - последствия будут непредсказуемы.\n\nОткрывает кнопки выбора жертвы (ниже)."

 # --- 2-г Тайная партийная агитация ---
 SOV_secret_agitation: "Тайная партийная агитация"
 SOV_secret_agitation_desc: "Развернуть подпольную агитацию за партии гостей. Народ потянется к нам, но Сталин почует неладное."

 # --- 2-д Рапорт об успехах ---
 SOV_success_report: "Рапорт об успехах"
 SOV_success_report_desc: "Отчитаться перед Вождём о трудовых достижениях. Доверие вырастет, но придётся бросить фабрики на товары для народа."

 # --- 2-е Самовольная инициатива ---
 SOV_unauthorized_initiative: "Самовольная инициатива"
 SOV_unauthorized_initiative_desc: "Действовать в обход Вождя, продвигая идеи гостей напрямую. Народ откликнется, но Сталин этого не одобрит."

 # --- Идеи / нацдух ---
 guests_from_future_weakened_idea: "Гости из будущего"
 guests_from_future_weakened_idea_desc: "Лучшие умы заняты разбором технологий, переданных Вождю"

 mcksp_secret_agitation_idea: "Тайная партийная агитация"
 mcksp_secret_agitation_idea_desc: "Подпольные агитаторы день за днём вербуют сторонников партий гостей.\n\n§YСуммарно +20 п.п.§! популярности блоку партий гостей за 140 дней\n§R-5%§! к приросту политической власти"

 mcksp_enemy_abroad_spirit: "Враг народа за границей!"
 mcksp_enemy_abroad_spirit_desc: "Беглец очерняет советскую власть из-за рубежа. Пока Сталин у руля, этот позор не смыть.\n\n§R-15%§! стабильности\n§R-10%§! к приросту политической власти"

