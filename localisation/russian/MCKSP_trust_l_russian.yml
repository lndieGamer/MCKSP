 # --- Категория решений ---
 SOV_MCKSP_trust_cat: "Доверие Вождя"
 SOV_MCKSP_trust_cat_desc: "Иосиф Виссарионович внимательно следит за гостями из будущего. Каждое наше действие приближает нас либо к его благосклонности, либо к расстрельной стене."

